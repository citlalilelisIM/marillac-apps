<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mini Apps Estudiantiles</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body{
      background: linear-gradient(135deg,#0f172a,#1e293b);
      color:white;
      min-height:100vh;
      padding:40px;
    }

    h1{
      text-align:center;
      margin-bottom:10px;
      font-size:3rem;
    }

    .subtitle{
      text-align:center;
      margin-bottom:40px;
      color:#cbd5e1;
    }

    .container{
      max-width:1200px;
      margin:auto;
    }

    .folders{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
      gap:20px;
      margin-bottom:50px;
    }

    .folder-btn{
      background:#1e293b;
      border:1px solid #334155;
      padding:30px;
      border-radius:18px;
      cursor:pointer;
      transition:0.3s;
      text-align:center;
      font-size:1.2rem;
      font-weight:bold;
    }

    .folder-btn:hover{
      transform:translateY(-5px);
      background:#334155;
      border-color:#60a5fa;
    }

    .apps{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
      gap:20px;
    }

    .card{
      background:#1e293b;
      border-radius:18px;
      padding:25px;
      border:1px solid #334155;
      transition:0.3s;
    }

    .card:hover{
      transform:scale(1.03);
      border-color:#60a5fa;
    }

    .card h3{
      margin-bottom:15px;
    }

    .card a{
      display:inline-block;
      margin-top:10px;
      padding:10px 16px;
      background:#3b82f6;
      color:white;
      text-decoration:none;
      border-radius:10px;
      transition:0.3s;
    }

    .card a:hover{
      background:#2563eb;
    }

    .section-title{
      margin-bottom:25px;
      font-size:1.8rem;
      color:#93c5fd;
    }

    footer{
      text-align:center;
      margin-top:60px;
      color:#94a3b8;
    }

    .error-message{
      background:#7f1d1d;
      border:1px solid #ef4444;
      border-radius:12px;
      padding:20px;
      text-align:center;
    }
  </style>
</head>

<body>

  <div class="container">

    <h1>Mini Apps Estudiantiles</h1>
    <p class="subtitle">
      Selecciona un directorio para visualizar los proyectos HTML
    </p>

    <!-- BOTONES DE DIRECTORIOS -->
    <div class="folders">
      <div class="folder-btn" onclick="showFolder('2010')">
        📁 Grupo 2010
      </div>

      <div class="folder-btn" onclick="showFolder('2020')">
        📁 Grupo 2020
      </div>

      <div class="folder-btn" onclick="showFolder('2030')">
        📁 Grupo 2030
      </div>

      <div class="folder-btn" onclick="showFolder('2040')">
        📁 Grupo 2040
      </div>
    </div>

    <!-- AREA DE APPS -->
    <div id="apps-container">

      <h2 class="section-title">
        Selecciona un directorio
      </h2>

    </div>

    <footer>
      Plataforma de proyectos estudiantiles
    </footer>

  </div>

  <script>

    // =============================================
    // CONFIGURACIÓN DE DIRECTORIOS Y ARCHIVOS HTML
    // =============================================
    // ACTUALIZA ESTA LISTA CON TUS ARCHIVOS REALES
    
    const folders = {

      // Directorio 2010 - Actualiza con tus archivos reales
      2010: [
        { title: "Proyecto 1", file: "2010/proyecto1.html" },
        { title: "Proyecto 2", file: "2010/proyecto2.html" },
        { title: "Proyecto 3", file: "2010/proyecto3.html" }
      ],

      // Directorio 2020 - PON AQUÍ TUS ARCHIVOS HTML REALES
      2020: [
        { title: "Alan", file: "2020/alan.html" },
        { title: "Aldo", file: "2020/aldo.html" }
        // Agrega más archivos aquí según necesites:
        // { title: "Nombre del proyecto", file: "2020/nombre_archivo.html" }
      ],

      // Directorio 2030
      2030: [
        { title: "Clima", file: "2030/clima/index.html" }
        // Si los archivos están directamente en la carpeta 2030, usa:
        // { title: "Clima", file: "2030/clima.html" }
      ],

      // Directorio 2040
      2040: [
        { title: "Galería", file: "2040/galeria/index.html" }
        // Si los archivos están directamente en la carpeta 2040, usa:
        // { title: "Galería", file: "2040/galeria.html" }
      ]

    };

    // Función para verificar si un archivo existe (opcional)
    async function checkFileExists(url) {
      try {
        const response = await fetch(url, { method: 'HEAD' });
        return response.ok;
      } catch(error) {
        return false;
      }
    }

    function showFolder(folderName){

      const container = document.getElementById("apps-container");

      // Verificar si el folder existe en nuestra configuración
      if (!folders[folderName]) {
        container.innerHTML = `
          <h2 class="section-title">
            Directorio: ${folderName}
          </h2>
          <div class="error-message">
            <h3>⚠️ Directorio no configurado</h3>
            <p>Este directorio aún no tiene proyectos registrados en la configuración.</p>
          </div>
        `;
        return;
      }

      // Verificar si el folder tiene proyectos
      if (folders[folderName].length === 0) {
        container.innerHTML = `
          <h2 class="section-title">
            Directorio: ${folderName}
          </h2>
          <div class="apps">
            <div class="card">
              <h3>📂 No hay proyectos disponibles</h3>
              <p>Este directorio aún no tiene archivos HTML configurados.</p>
              <small>Agrega los proyectos en la sección "folders" del código.</small>
            </div>
          </div>
        `;
        return;
      }

      // Construir el HTML con las aplicaciones
      let html = `
        <h2 class="section-title">
          📁 Directorio: ${folderName}
        </h2>
        <div class="apps">
      `;

      // Agregar cada proyecto
      folders[folderName].forEach((app, index) => {
        html += `
          <div class="card">
            <h3>📄 ${app.title}</h3>
            <a href="${app.file}" target="_blank" rel="noopener noreferrer">
              🔗 Abrir Proyecto
            </a>
          </div>
        `;
      });

      html += `</div>`;
      
      // Agregar un mensaje informativo
      html += `
        <div style="margin-top: 20px; padding: 15px; background: #0f172a; border-radius: 12px; font-size: 0.9rem; color: #94a3b8; text-align: center;">
          💡 Los proyectos se abrirán en una nueva pestaña. Si ves un error 404, verifica que la ruta del archivo sea correcta.
        </div>
      `;

      container.innerHTML = html;
    }

    // Función para agregar nuevos proyectos dinámicamente (opcional)
    function addProjectToFolder(folderName, title, filePath) {
      if (!folders[folderName]) {
        folders[folderName] = [];
      }
      folders[folderName].push({ title: title, file: filePath });
      console.log(`✅ Proyecto "${title}" agregado a ${folderName}`);
    }

    // Ejemplo de cómo agregar más proyectos desde la consola del navegador:
    // addProjectToFolder('2020', 'Nuevo Proyecto', '2020/nuevo.html');

    // Mostrar mensaje en consola para ayudar al desarrollador
    console.log('📚 Configuración actual de directorios:', folders);
    console.log('💡 Para agregar más proyectos, edita el objeto "folders" en el código o usa addProjectToFolder()');

  </script>

</body>
</html>
