<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mini Apps Estudiantiles</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body{
      background: linear-gradient(135deg,#0f172a,#1e293b);
      color:white;
      min-height:100vh;
      padding:40px;
    }

    h1{
      text-align:center;
      margin-bottom:10px;
      font-size:3rem;
    }

    .subtitle{
      text-align:center;
      margin-bottom:40px;
      color:#cbd5e1;
    }

    .container{
      max-width:1200px;
      margin:auto;
    }

    .folders{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
      gap:20px;
      margin-bottom:50px;
    }

    .folder-btn{
      background:#1e293b;
      border:1px solid #334155;
      padding:30px;
      border-radius:18px;
      cursor:pointer;
      transition:0.3s;
      text-align:center;
      font-size:1.2rem;
      font-weight:bold;
    }

    .folder-btn:hover{
      transform:translateY(-5px);
      background:#334155;
      border-color:#60a5fa;
    }

    .apps{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
      gap:20px;
    }

    .card{
      background:#1e293b;
      border-radius:18px;
      padding:25px;
      border:1px solid #334155;
      transition:0.3s;
    }

    .card:hover{
      transform:scale(1.03);
      border-color:#60a5fa;
    }

    .card h3{
      margin-bottom:15px;
    }

    .card a{
      display:inline-block;
      margin-top:10px;
      padding:10px 16px;
      background:#3b82f6;
      color:white;
      text-decoration:none;
      border-radius:10px;
      transition:0.3s;
    }

    .card a:hover{
      background:#2563eb;
    }

    .section-title{
      margin-bottom:25px;
      font-size:1.8rem;
      color:#93c5fd;
    }

    footer{
      text-align:center;
      margin-top:60px;
      color:#94a3b8;
    }
  </style>
</head>

<body>

  <div class="container">

    <h1>Mini Apps Estudiantiles</h1>
    <p class="subtitle">
      Selecciona un directorio para visualizar los proyectos HTML
    </p>

    <!-- BOTONES DE DIRECTORIOS -->
    <div class="folders">
      <div class="folder-btn" onclick="showFolder('2010')">
        📁 Grupo 2010

      <div class="folder-btn" onclick="showFolder('2020')">
        📁 Grupo 2020
      </div>

      <div class="folder-btn" onclick="showFolder('2030')">
        📁 Grupo 2030
      </div>

      <div class="folder-btn" onclick="showFolder('2040')">
        📁 Grupo 2040
      </div>
    </div>

    <!-- AREA DE APPS -->
    <div id="apps-container">

      <h2 class="section-title">
        Selecciona un directorio
      </h2>

    </div>

    <footer>
      Plataforma de proyectos estudiantiles
    </footer>

  </div>

  <script>

    // AQUI CONFIGURAS TUS DIRECTORIOS Y ARCHIVOS HTML
    const folders = {

      2010: [
        {
          title: "XX",
          file: 
        },
        {
          title: "YY",
          file: 
        }
      ],

      2020: [
        {
          title: "Alan",
          file: "2020/alan.html"
        },
        {
          title: "Aldo",
          file: "2020/aldo.html"
        }
      ],

      2030: [
        {
          title: "Clima",
          file: "grupo3/clima/index.html"
        }
      ],

      2040: [
        {
          title: "Galería",
          file: "grupo4/galeria/index.html"
        }
      ]

    };

    function showFolder(folderName){

      const container = document.getElementById("apps-container");

      let html = `
        <h2 class="section-title">
          Directorio: ${folderName}
        </h2>

        <div class="apps">
      `;

      folders[folderName].forEach(app => {

        html += `
          <div class="card">
            <h3>${app.title}</h3>

            <a href="${app.file}" target="_blank">
              Abrir Proyecto
            </a>
          </div>
        `;

      });

      html += `</div>`;

      container.innerHTML = html;
    }

  </script>

</body>
</html>
