  <title>Mini Apps Estudiantiles</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body{
      background: linear-gradient(135deg,#0f172a,#1e293b);
      color:white;
      min-height:100vh;
      padding:40px;
    }

    h1{
      text-align:center;
      margin-bottom:10px;
      font-size:3rem;
    }

    .subtitle{
      text-align:center;
      margin-bottom:40px;
      color:#cbd5e1;
    }

    .container{
      max-width:1200px;
      margin:auto;
    }

    .folders{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
      gap:20px;
      margin-bottom:50px;
    }

    .folder-btn{
      background:#1e293b;
      border:1px solid #334155;
      padding:30px;
      border-radius:18px;
      cursor:pointer;
      transition:0.3s;
      text-align:center;
      font-size:1.2rem;
      font-weight:bold;
    }

    .folder-btn:hover{
      transform:translateY(-5px);
      background:#334155;
      border-color:#60a5fa;
    }

    .apps{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
      gap:20px;
    }

    .card{
      background:#1e293b;
      border-radius:18px;
      padding:25px;
      border:1px solid #334155;
      transition:0.3s;
    }

    .card:hover{
      transform:scale(1.03);
      border-color:#60a5fa;
    }

    .card h3{
      margin-bottom:15px;
    }

    .card a{
      display:inline-block;
      margin-top:10px;
      padding:10px 16px;
      background:#3b82f6;
      color:white;
      text-decoration:none;
      border-radius:10px;
      transition:0.3s;
    }

    .card a:hover{
      background:#2563eb;
    }

    .section-title{
      margin-bottom:25px;
      font-size:1.8rem;
      color:#93c5fd;
    }

    footer{
      text-align:center;
      margin-top:60px;
      color:#94a3b8;
    }
  </style>
</head>

    function showFolder(folderName){

      const container = document.getElementById("apps-container");

      // Pequeña validación: si el folder no existe o está vacío, mostramos un mensaje
      if (!folders[folderName] || folders[folderName].length === 0) {
        container.innerHTML = `
          <h2 class="section-title">
            Directorio: ${folderName}
          </h2>
          <div class="apps">
            <div class="card">
              <h3>No hay proyectos disponibles</h3>
              <p>Este directorio aún no tiene aplicaciones configuradas.</p>
            </div>
          </div>
        `;
        return;
      }

      let html = `
        <h2 class="section-title">
          Directorio: ${folderName}
        </h2>

        <div class="apps">
      `;

      folders[folderName].forEach(app => {

        html += `
          <div class="card">
            <h3>${app.title}</h3>

            <a href="${app.file}" target="_blank">
              Abrir Proyecto
            </a>
          </div>
        `;

      });

      html += `</div>`;

      container.innerHTML = html;
    }
