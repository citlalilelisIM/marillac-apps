<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zanahoria-Pendiente</title>
    <style>
        :root {
            --bg-color: #ff9ff3;
            --grass: #1dd1a1;
            --sky: #48dbfb;
            --rabbit-color: #bdc3c7;
        }

        body {
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(var(--sky) 60%, var(--grass) 60%);
            font-family: 'Arial Rounded MT Bold', Arial, sans-serif;
            overflow: hidden;
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            border: 8px solid #fff;
            width: 380px;
            z-index: 10;
        }

        h1 { color: #f368e0; margin: 0 0 20px 0; font-size: 28px; text-shadow: 2px 2px #fff; }

        #game-area {
            height: 220px;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            margin-bottom: 20px;
            background: rgba(255,255,255,0.5);
            border-radius: 20px;
        }

        .conejo {
            width: 120px;
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.27, 1.55);
            position: relative;
            z-index: 5;
        }

        #svg-conejo { width: 100%; height: auto; }

        /* Estados del Conejo */
        .gordito { transform: scale(1.3, 1.05); filter: drop-shadow(0 0 10px #feca57); }
        .flaco { transform: scale(0.7, 1.25); filter: grayscale(0.6) contrast(0.8); }
        
        .jump { animation: jumpAnim 0.5s ease-in-out; }
        @keyframes jumpAnim {
            0%, 100% { transform: translateY(0) scale(1.3, 1.05); }
            50% { transform: translateY(-60px) scale(1.2, 1.1); }
        }

        .shake { animation: shakeAnim 0.8s infinite; }
        @keyframes shakeAnim {
            0%, 100% { transform: translateX(0) scale(0.7, 1.25); }
            20% { transform: translateX(-3px) scale(0.7, 1.25); }
            80% { transform: translateX(3px) scale(0.7, 1.25); }
        }

        /* UI de Tareas */
        .input-group { display: flex; gap: 10px; margin-bottom: 15px; }
        input {
            flex: 1;
            padding: 12px;
            border-radius: 15px;
            border: 3px solid #f368e0;
            font-size: 16px;
            outline: none;
        }
        button.btn-add {
            padding: 10px 20px;
            background: #f368e0;
            color: white;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            transition: 0.2s;
        }
        button.btn-add:hover { background: #ff9ff3; transform: scale(1.05); }

        #lista-tareas {
            list-style: none;
            padding: 0;
            max-height: 120px;
            overflow-y: auto;
            margin: 0;
        }
        .tarea-item {
            background: #fff;
            margin: 5px 0;
            padding: 10px 15px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 2px solid #eee;
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .btn-del { background: #ff4757; color: white; border: none; border-radius: 8px; padding: 5px 10px; cursor: pointer; }

        .zanahoria-icon {
            font-size: 40px;
            position: absolute;
            bottom: 30px;
            left: 45%;
            opacity: 0;
            z-index: 10;
        }
        .eat-anim { animation: eatAnim 0.6s forwards; }
        @keyframes eatAnim {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-80px) rotate(45deg); opacity: 0; }
        }

        #status-text { font-size: 18px; font-weight: bold; margin: 10px 0; min-height: 24px; }
        .footer { margin-top: 20px; font-size: 12px; color: #576574; letter-spacing: 1px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Zanahoria-Pendiente</h1>
    
    <div id="game-area">
        <span id="zanahoria" class="zanahoria-icon">🥕</span>
        <div id="conejo-body" class="conejo flaco shake">
            <svg id="svg-conejo" viewBox="0 0 100 100">
                <ellipse cx="35" cy="20" rx="10" ry="25" fill="#bdc3c7" stroke="#95a5a6" stroke-width="2"/>
                <ellipse cx="65" cy="20" rx="10" ry="25" fill="#bdc3c7" stroke="#95a5a6" stroke-width="2"/>
                <circle cx="50" cy="65" r="35" fill="#bdc3c7" stroke="#95a5a6" stroke-width="2"/>
                <circle cx="40" cy="60" r="4" fill="#2c3e50" />
                <circle cx="60" cy="60" r="4" fill="#2c3e50" />
                <path d="M47 68 L53 68 L50 72 Z" fill="#ff9999" />
                <line x1="30" y1="70" x2="15" y2="68" stroke="#95a5a6" />
                <line x1="70" y1="70" x2="85" y2="68" stroke="#95a5a6" />
            </svg>
        </div>
    </div>

    <div id="status-text" style="color: #ff4757;">¡Tengo mucha hambre! 😭</div>

    <div class="input-group">
        <input type="text" id="tarea-input" placeholder="Escribe un pendiente..." onkeypress="if(event.key==='Enter') agregarTarea()">
        <button class="btn-add" onclick="agregarTarea()">Añadir</button>
    </div>

    <ul id="lista-tareas"></ul>

    <div class="footer">Creado por VRO</div>
</div>

<script>
    const conejo = document.getElementById('conejo-body');
    const statusText = document.getElementById('status-text');
    const lista = document.getElementById('lista-tareas');
    const input = document.getElementById('tarea-input');
    const zanahoria = document.getElementById('zanahoria');
    
    let tareasCount = 0;

    function hablar(texto, tono) {
        // Cancelar cualquier voz previa para evitar retrasos
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(texto);
        msg.lang = 'es-MX';
        msg.pitch = tono; 
        msg.rate = 1.2;
        window.speechSynthesis.speak(msg);
    }

    function actualizarEstado() {
        if (tareasCount > 0) {
            // Estado FELIZ / GORDO
            conejo.classList.remove('flaco', 'shake');
            conejo.classList.add('gordito', 'jump');
            statusText.innerText = "¡Yummm! ¡Qué rico! 🐰✨";
            statusText.style.color = "#2ecc71";
            
            hablar("¡Qué rica zanahoria!", 1.8);

            zanahoria.classList.add('eat-anim');
            setTimeout(() => {
                zanahoria.classList.remove('eat-anim');
                conejo.classList.remove('jump');
            }, 600);
        } else {
            // Estado HAMBRIENTO / FLACO
            conejo.classList.remove('gordito', 'jump');
            conejo.classList.add('flaco', 'shake');
            statusText.innerText = "¡Tengo mucha hambre! 😭";
            statusText.style.color = "#ff4757";
            
            hablar("Tengo hambre, por favor pon un pendiente", 0.8);
        }
    }

    function agregarTarea() {
        const texto = input.value.trim();
        if (texto === "") {
            alert("¡Escribe algo primero!");
            return;
        }

        tareasCount++;
        
        const li = document.createElement('li');
        li.className = 'tarea-item';
        li.innerHTML = `
            <span>${texto}</span>
            <button class="btn-del" onclick="eliminarTarea(this)">Terminado</button>
        `;
        
        lista.prepend(li); // Poner la nueva tarea arriba
        input.value = "";
        actualizarEstado();
    }

    function eliminarTarea(btn) {
        btn.parentElement.style.opacity = "0";
        setTimeout(() => {
            btn.parentElement.remove();
            tareasCount--;
            actualizarEstado();
        }, 200);
    }

    // El navegador necesita un clic para activar el sonido la primera vez
    document.body.onclick = () => {
        if(tareasCount === 0 && statusText.innerText === "¡Tengo mucha hambre! 😭") {
            hablar("¡Hola! Tengo hambre.", 1);
        }
        // Quitar este evento después del primer clic
        document.body.onclick = null;
    };
</script>

</body>
</html>
