<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invasión Galáctica Retro - Renata</title>
    <style>
        /* ESTILOS CSS - Diseño Retro Futurista */
        body {
            margin: 0;
            padding: 0;
            background-color: #050505;
            color: #00ff41; /* Verde Matrix/Retro */
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        #game-container {
            position: relative;
            border: 4px solid #ff00ff; /* Borde Neón */
            box-shadow: 0 0 20px #ff00ff, inset 0 0 10px #ff00ff;
            background-color: #000;
        }

        canvas {
            display: block;
        }

        /* Pantallas de Inicio y Fin */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            z-index: 10;
        }

        h1 {
            font-size: 3rem;
            color: #00ffff;
            text-shadow: 0 0 10px #00ffff;
            margin-bottom: 10px;
        }

        .score-board {
            position: absolute;
            top: 10px;
            left: 15px;
            font-size: 20px;
            color: #ffff00;
            text-shadow: 0 0 5px #ffff00;
            z-index: 5;
        }

        button {
            padding: 15px 30px;
            font-size: 1.2rem;
            background: transparent;
            color: #ff00ff;
            border: 2px solid #ff00ff;
            cursor: pointer;
            font-family: inherit;
            transition: 0.3s;
            box-shadow: 0 0 10px #ff00ff;
        }

        button:hover {
            background: #ff00ff;
            color: #fff;
            box-shadow: 0 0 25px #ff00ff;
        }

        .creditos {
            margin-top: 15px;
            font-size: 14px;
            color: #555;
        }

        #final-score {
            font-size: 2rem;
            color: #ffff00;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div class="score-board">Puntos: <span id="score">0</span></div>
        
        <div id="start-screen" class="overlay">
            <h1>MARCIANITOS</h1>
            <p>Usa las flechas o A/D para moverte.<br>Espacio para disparar.</p>
            <button onclick="startGame()">INICIAR MISIÓN</button>
            <div class="creditos">Creado por renata ximenazumaya martinez</div>
        </div>

        <div id="game-over-screen" class="overlay" style="display: none;">
            <h1>FIN DEL JUEGO</h1>
            <div id="final-score"></div>
            <button onclick="startGame()">REINTENTAR</button>
            <div class="creditos">Creado por renata ximenazumaya martinez</div>
        </div>

        <canvas id="gameCanvas"></canvas>
    </div>

    <script>
        // LÓGICA JAVASCRIPT
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const startScreen = document.getElementById('start-screen');
        const gameOverScreen = document.getElementById('game-over-screen');
        const finalScoreElement = document.getElementById('final-score');

        // Configuración
        canvas.width = 600;
        canvas.height = 500;
        
        let score = 0;
        let gameActive = false;
        let player, bullets, enemies, enemyDirection, enemyStepDown;

        class Entity {
            constructor(x, y, emoji, size) {
                this.x = x;
                this.y = y;
                this.emoji = emoji;
                this.size = size;
            }
            draw() {
                ctx.font = `${this.size}px Arial`;
                ctx.textAlign = "center";
                ctx.fillText(this.emoji, this.x, this.y);
            }
        }

        function startGame() {
            score = 0;
            scoreElement.innerText = score;
            gameActive = true;
            startScreen.style.display = 'none';
            gameOverScreen.style.display = 'none';
            
            player = new Entity(canvas.width / 2, canvas.height - 30, "🚀", 40);
            bullets = [];
            enemies = [];
            enemyDirection = 1;
            enemyStepDown = false;

            // Crear horda de marcianitos
            for (let row = 0; row < 4; row++) {
                for (let col = 0; col < 8; col++) {
                    enemies.push({
                        x: 50 + col * 60,
                        y: 50 + row * 50,
                        emoji: row % 2 === 0 ? "👾" : "🛸",
                        alive: true
                    });
                }
            }
            requestAnimationFrame(update);
        }

        // Controles
        const keys = {};
        window.addEventListener('keydown', e => keys[e.code] = true);
        window.addEventListener('keyup', e => {
            keys[e.code] = false;
            if (e.code === 'Space' && gameActive) {
                bullets.push({ x: player.x, y: player.y - 20 });
            }
        });

        function update() {
            if (!gameActive) return;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Movimiento Jugador
            if ((keys['ArrowLeft'] || keys['KeyA']) && player.x > 30) player.x -= 5;
            if ((keys['ArrowRight'] || keys['KeyD']) && player.x < canvas.width - 30) player.x += 5;
            player.draw();

            // Balas
            bullets.forEach((b, index) => {
                b.y -= 7;
                ctx.font = "20px Arial";
                ctx.fillText("🔥", b.x, b.y);
                if (b.y < 0) bullets.splice(index, 1);
            });

            // Enemigos
            let hitEdge = false;
            enemies.forEach(en => {
                if (!en.alive) return;
                
                en.x += 2 * enemyDirection;
                if (en.x > canvas.width - 30 || en.x < 30) hitEdge = true;

                // Dibujar enemigo
                ctx.font = "35px Arial";
                ctx.fillText(en.emoji, en.x, en.y);

                // Colisión con Balas
                bullets.forEach((b, bIndex) => {
                    if (Math.abs(b.x - en.x) < 20 && Math.abs(b.y - en.y) < 20) {
                        en.alive = false;
                        bullets.splice(bIndex, 1);
                        score += 100;
                        scoreElement.innerText = score;
                    }
                });

                // Colisión con Jugador o fin de pantalla
                if (en.y > canvas.height - 50) endGame();
            });

            if (hitEdge) {
                enemyDirection *= -1;
                enemies.forEach(en => en.y += 20);
            }

            // Limpiar enemigos muertos y chequear victoria
            enemies = enemies.filter(en => en.alive);
            if (enemies.length === 0) {
                // Siguiente nivel (reiniciar horda)
                startGame(); 
            }

            requestAnimationFrame(update);
        }

        function endGame() {
            gameActive = false;
            gameOverScreen.style.display = 'flex';
            finalScoreElement.innerText = "PUNTUACIÓN: " + score;
        }
    </script>
</body>
</html>
