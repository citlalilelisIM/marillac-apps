<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Nitro Neon: Toretto Edition</title>
    <style>
        :root {
            --neon-blue: #00d4ff;
            --neon-pink: #ff00ff;
            --deep-navy: #0a0b1e;
        }

        body {
            margin: 0;
            background-color: var(--deep-navy);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #game-container {
            position: relative;
            width: 800px;
            height: 600px;
            border: 3px solid var(--neon-blue);
            box-shadow: 0 0 20px var(--neon-blue);
            background: black;
        }

        canvas { display: block; }

        /* Pantallas */
        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(10, 11, 30, 0.9);
            text-align: center;
            z-index: 10;
        }

        h1 {
            font-size: 3rem;
            text-transform: uppercase;
            letter-spacing: 5px;
            color: var(--neon-blue);
            text-shadow: 0 0 10px var(--neon-blue);
            margin-bottom: 10px;
        }

        .hidden { display: none !important; }

        .btn {
            padding: 15px 40px;
            background: transparent;
            border: 2px solid var(--neon-pink);
            color: var(--neon-pink);
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            font-weight: bold;
            margin-top: 20px;
        }

        .btn:hover {
            background: var(--neon-pink);
            color: white;
            box-shadow: 0 0 20px var(--neon-pink);
        }

        #ui-layer {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
            z-index: 5;
        }

        .stat-box {
            font-size: 1.5rem;
            color: var(--neon-blue);
            text-shadow: 0 0 5px black;
        }

        .credit {
            position: absolute;
            bottom: 10px;
            right: 10px;
            font-size: 0.8rem;
            opacity: 0.7;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="ui-layer" class="hidden">
        <div class="stat-box">PUNTOS: <span id="score">0</span></div>
        <div class="stat-box">NIVEL: <span id="level-name">CALLES BAJAS</span></div>
    </div>

    <div id="start-screen" class="overlay">
        <h1>NITRO NEON</h1>
        <p>🏎️ Conduce el Charger de Toretto</p>
        <p>Esquiva el tráfico a toda velocidad para ganar puntos</p>
        <button class="btn" onclick="startGame()">INICIAR CARRERA</button>
        <div class="credit">Creado por [TAD]</div>
    </div>

    <div id="end-screen" class="overlay hidden">
        <h1 id="end-title">¡CHOQUE!</h1>
        <p id="end-msg">Tu leyenda terminó aquí.</p>
        <div class="stat-box">PUNTOS TOTALES: <span id="final-score">0</span></div>
        <button class="btn" onclick="location.reload()">REINTENTAR</button>
    </div>

    <canvas id="gameCanvas" width="800" height="600"></canvas>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    // Variables de Juego
    let score = 0;
    let level = 1;
    let speed = 5;
    let gameActive = false;
    let carX = 400;
    const carWidth = 60;
    const carHeight = 100;
    let obstacles = [];
    let particles = [];
    let frames = 0;

    // Sonidos (Beeps sintéticos para no requerir archivos externos)
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playSound(freq, type, duration) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
    }

    // Controles
    const keys = {};
    window.addEventListener('keydown', e => keys[e.code] = true);
    window.addEventListener('keyup', e => keys[e.code] = false);

    function startGame() {
        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('ui-layer').classList.remove('hidden');
        gameActive = true;
        animate();
        playSound(440, 'sawtooth', 0.1);
    }

    class Obstacle {
        constructor() {
            this.w = 50;
            this.h = 80;
            this.x = Math.random() * (canvas.width - this.w);
            this.y = -this.h;
            this.speed = speed + (Math.random() * 2);
            this.emoji = ['🚔', '🚚', '🚧', '🚐'][Math.floor(Math.random()*4)];
        }
        update() {
            this.y += this.speed;
        }
        draw() {
            ctx.font = "50px serif";
            ctx.fillText(this.emoji, this.x, this.y + 50);
        }
    }

    function createParticle(x, y) {
        for(let i=0; i<5; i++) {
            particles.push({
                x, y, 
                vx: (Math.random()-0.5)*5, 
                vy: (Math.random()-0.5)*5, 
                life: 1
            });
        }
    }

    function update() {
        if (!gameActive) return;

        // Movimiento Toretto
        if (keys['ArrowLeft'] && carX > 0) carX -= 7;
        if (keys['ArrowRight'] && carX < canvas.width - carWidth) carX += 7;

        // Generar tráfico
        if (frames % Math.max(20, 60 - (level * 5)) === 0) {
            obstacles.push(new Obstacle());
        }

        obstacles.forEach((obs, index) => {
            obs.update();
            
            // Colisión
            if (carX < obs.x + obs.w && carX + carWidth > obs.x &&
                canvas.height - 120 < obs.y + obs.h && canvas.height - 20 > obs.y) {
                gameOver();
            }

            // Puntos por rebasar
            if (obs.y > canvas.height) {
                obstacles.splice(index, 1);
                score += 10;
                if(score % 100 === 0) upgradeLevel();
            }
        });

        // Partículas (humo/velocidad)
        if (frames % 2 === 0) createParticle(carX + carWidth/2, canvas.height - 20);
        particles.forEach((p, i) => {
            p.x += p.vx; p.y += p.vy; p.life -= 0.02;
            if(p.life <= 0) particles.splice(i, 1);
        });

        document.getElementById('score').innerText = score;
        frames++;
    }

    function upgradeLevel() {
        level++;
        speed += 1.5;
        playSound(880, 'square', 0.2);
        const names = ["CALLES BAJAS", "AUTOPISTA NEON", "ZONA ESPACIAL", "MEGA CARRERA FINAL"];
        document.getElementById('level-name').innerText = names[Math.min(level-1, 3)];
        
        if(level === 4) {
            canvas.style.boxShadow = "0 0 50px var(--neon-pink)";
        }
    }

    function draw() {
        // Fondo Espacial/Futurista
        ctx.fillStyle = '#0a0b1e';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Líneas de carretera (Animación de velocidad)
        ctx.strokeStyle = '#00d4ff33';
        ctx.lineWidth = 2;
        for(let i = 0; i < 10; i++) {
            let y = (frames * speed + i * 100) % canvas.height;
            ctx.beginPath();
            ctx.moveTo(0, y); ctx.lineTo(canvas.width, y);
            ctx.stroke();
        }

        // Partículas
        particles.forEach(p => {
            ctx.fillStyle = `rgba(0, 212, 255, ${p.life})`;
            ctx.fillRect(p.x, p.y, 4, 4);
        });

        // Dibujar el Carro de Toretto (Charger Negro)
        ctx.fillStyle = '#111';
        // Carrocería principal
        ctx.fillRect(carX, canvas.height - 120, carWidth, carHeight);
        // Detalles de metal/brillo
        ctx.fillStyle = '#444';
        ctx.fillRect(carX + 5, canvas.height - 110, carWidth - 10, 20); // Parabrisas
        ctx.fillStyle = 'silver';
        ctx.fillRect(carX + 15, canvas.height - 125, 30, 15); // El Supercharger (motor fuera)
        
        // Luces traseras neon
        ctx.shadowBlur = 10;
        ctx.shadowColor = 'red';
        ctx.fillStyle = 'red';
        ctx.fillRect(carX, canvas.height - 30, 15, 5);
        ctx.fillRect(carX + 45, canvas.height - 30, 15, 5);
        ctx.shadowBlur = 0;

        obstacles.forEach(obs => obs.draw());
    }

    function gameOver() {
        gameActive = false;
        playSound(100, 'sawtooth', 0.5);
        document.getElementById('end-screen').classList.remove('hidden');
        document.getElementById('final-score').innerText = score;
        
        if(level >= 4) {
            document.getElementById('end-title').innerText = "¡LEYENDA COMPLETADA!";
            document.getElementById('end-msg').innerText = "Dominaste la Mega Carrera.";
        }
    }

    function animate() {
        if (!gameActive) return;
        update();
        draw();
        requestAnimationFrame(animate);
    }

    // Dibujo inicial
    draw();
</script>
</body>
</html>
