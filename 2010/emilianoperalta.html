<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spider-Run: Escape de la Ciudad</title>
    <style>
        :root {
            --spider-red: #ed1d24;
            --spider-blue: #2b3a8c;
            --cartoon-yellow: #ffde06;
            --sky-blue: #87ceeb;
        }

        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Arial Black', sans-serif;
            background-color: var(--sky-blue);
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(to bottom, #4facfe 0%, #00f2fe 100%);
            overflow: hidden;
        }

        /* Ciudad animada de fondo */
        .city-bg {
            position: absolute;
            bottom: 150px;
            width: 200%;
            height: 300px;
            background-image: linear-gradient(transparent 70%, rgba(0,0,0,0.1) 70%),
                              repeating-linear-gradient(90deg, #555 0, #555 50px, #444 50px, #444 100px);
            animation: moveCity 10s linear infinite;
            z-index: 1;
        }

        @keyframes moveCity {
            from { transform: translateX(0); }
            to { transform: translateX(-50%); }
        }

        /* Suelo */
        #ground {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 150px;
            background: #555;
            border-top: 10px solid #333;
            z-index: 2;
        }

        /* Personaje Spiderman */
        #player {
            position: absolute;
            bottom: 150px;
            left: 100px;
            width: 60px;
            height: 80px;
            background-color: var(--spider-red);
            border: 4px solid #000;
            border-radius: 10px;
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: bottom 0.1s;
        }

        #player::after {
            content: "🕷️";
            font-size: 40px;
        }

        /* Elementos del juego */
        .obstacle {
            position: absolute;
            bottom: 150px;
            width: 50px;
            height: 70px;
            background-color: #333;
            border-radius: 5px;
            z-index: 5;
        }

        .coin {
            position: absolute;
            width: 30px;
            height: 30px;
            background-color: var(--cartoon-yellow);
            border: 3px solid #b8860b;
            border-radius: 50%;
            z-index: 5;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            animation: bounce 0.5s infinite alternate;
        }

        @keyframes bounce {
            from { transform: translateY(0); }
            to { transform: translateY(-10px); }
        }

        /* UI */
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 20;
            color: white;
            text-shadow: 3px 3px 0 #000;
            font-size: 24px;
        }

        #credits {
            position: absolute;
            bottom: 10px;
            right: 20px;
            z-index: 20;
            color: white;
            font-size: 14px;
            opacity: 0.8;
        }

        #game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            display: none;
            z-index: 100;
        }

        button {
            background: var(--spider-red);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 20px;
            cursor: pointer;
            border-radius: 10px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="ui">
        Puntos: <span id="score-val">0</span><br>
        Tiempo: <span id="time-val">0</span>s
    </div>

    <div class="city-bg"></div>
    <div id="ground"></div>
    <div id="player"></div>

    <div id="credits">Desarrollado por: <b>Emiliano Peralta</b></div>

    <div id="game-over">
        <h1>¡TE ATRAPARON!</h1>
        <p>Puntaje final: <span id="final-score">0</span></p>
        <button onclick="resetGame()">REINTENTAR</button>
    </div>
</div>

<script>
    const player = document.getElementById('player');
    const scoreElement = document.getElementById('score-val');
    const timeElement = document.getElementById('time-val');
    const gameOverScreen = document.getElementById('game-over');
    const finalScoreElement = document.getElementById('final-score');

    let score = 0;
    let time = 0;
    let isJumping = false;
    let isGameOver = false;
    let gameSpeed = 5;
    let gravity = 0.9;

    // Control de salto
    document.addEventListener('keydown', (e) => {
        if ((e.code === 'Space' || e.code === 'ArrowUp') && !isJumping && !isGameOver) {
            jump();
        }
    });

    function jump() {
        let position = 150;
        isJumping = true;
        let upInterval = setInterval(() => {
            if (position >= 300) {
                clearInterval(upInterval);
                let downInterval = setInterval(() => {
                    if (position <= 150) {
                        clearInterval(downInterval);
                        isJumping = false;
                    }
                    position -= 5;
                    player.style.bottom = position + 'px';
                }, 20);
            }
            position += 8;
            player.style.bottom = position + 'px';
        }, 20);
    }

    // Generar obstáculos y monedas
    function createObject() {
        if (isGameOver) return;

        const container = document.getElementById('game-container');
        const type = Math.random() > 0.3 ? 'obstacle' : 'coin';
        const obj = document.createElement('div');
        obj.classList.add(type);
        
        let objPosition = window.innerWidth;
        obj.style.left = objPosition + 'px';
        
        if (type === 'coin') {
            obj.style.bottom = (180 + Math.random() * 100) + 'px';
            obj.innerHTML = "$";
        } else {
            obj.innerHTML = "🚔"; // Ladrón/Policía
            obj.style.fontSize = "40px";
            obj.style.display = "flex";
            obj.style.justifyContent = "center";
        }

        container.appendChild(obj);

        let moveInterval = setInterval(() => {
            if (isGameOver) {
                clearInterval(moveInterval);
                return;
            }

            objPosition -= gameSpeed;
            obj.style.left = objPosition + 'px';

            // Colisión
            let playerRect = player.getBoundingClientRect();
            let objRect = obj.getBoundingClientRect();

            if (
                playerRect.left < objRect.right &&
                playerRect.right > objRect.left &&
                playerRect.top < objRect.bottom &&
                playerRect.bottom > objRect.top
            ) {
                if (type === 'coin') {
                    score += 10;
                    scoreElement.innerText = score;
                    obj.remove();
                    clearInterval(moveInterval);
                } else {
                    endGame();
                }
            }

            if (objPosition < -50) {
                obj.remove();
                clearInterval(moveInterval);
            }
        }, 20);

        setTimeout(createObject, Math.random() * 2000 + 1000);
    }

    function endGame() {
        isGameOver = true;
        gameOverScreen.style.display = 'block';
        finalScoreElement.innerText = score;
    }

    function resetGame() {
        location.reload();
    }

    // Reloj
    setInterval(() => {
        if (!isGameOver) {
            time++;
            timeElement.innerText = time;
            if (time % 10 === 0) gameSpeed += 0.5; // Aumenta dificultad
        }
    }, 1000);

    createObject();
</script>
</body>
</html>
