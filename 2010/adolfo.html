<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlashFocus | Sistema de Gestión</title>
    <style>
        :root {
            --bg-color: #0a0b10;
            --card-bg: #14161f;
            --accent-color: #00f2ff;
            --text-primary: #e0e0e0;
            --text-secondary: #888da8;
            --danger: #ff2a6d;
            --border-glow: 0 0 10px rgba(0, 242, 255, 0.2);
        }

        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 5px;
            border: 1px solid #222;
            box-shadow: var(--border-glow);
            position: relative;
        }

        h1 {
            color: var(--accent-color);
            text-transform: uppercase;
            letter-spacing: 4px;
            text-align: center;
            font-size: 1.5rem;
            margin-bottom: 30px;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 30px;
        }

        input {
            background: #050505;
            border: 1px solid #333;
            color: white;
            padding: 12px;
            border-radius: 3px;
            outline: none;
            transition: border 0.3s;
        }

        input:focus {
            border-color: var(--accent-color);
        }

        button {
            background: transparent;
            border: 1px solid var(--accent-color);
            color: var(--accent-color);
            padding: 12px;
            cursor: pointer;
            text-transform: uppercase;
            font-weight: bold;
            transition: all 0.3s;
            letter-spacing: 2px;
        }

        button:hover {
            background: var(--accent-color);
            color: black;
            box-shadow: 0 0 15px var(--accent-color);
        }

        .task-list {
            list-style: none;
            padding: 0;
        }

        .task-item {
            background: #1a1d29;
            border-left: 3px solid var(--accent-color);
            padding: 15px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .task-info {
            display: flex;
            flex-direction: column;
        }

        .task-name { font-weight: bold; }
        .task-time { font-size: 0.8rem; color: var(--text-secondary); }

        .delete-btn {
            color: var(--danger);
            background: none;
            border: none;
            cursor: pointer;
            font-size: 0.8rem;
        }

        .delete-btn:hover {
            box-shadow: none;
            background: none;
            text-decoration: underline;
        }

        footer {
            margin-top: 40px;
            color: var(--text-secondary);
            font-size: 0.7rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Estilo para la notificación activa */
        .alert-active {
            border-color: var(--danger) !important;
            box-shadow: 0 0 20px rgba(255, 42, 109, 0.4) !important;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>FlashFocus</h1>
        
        <div class="input-group">
            <input type="text" id="taskInput" placeholder="NOMBRE DEL PENDIENTE...">
            <input type="datetime-local" id="timeInput">
            <button onclick="addTask()">Establecer Alerta</button>
        </div>

        <ul class="task-list" id="taskList">
            </ul>
    </div>

    <footer>Creado por AEVR</footer>

    <audio id="alarmSound" src="https://actions.google.com/sounds/v1/alarms/digital_watch_alarm_long.ogg"></audio>

    <script>
        let tasks = [];

        // Solicitar permiso de notificaciones al cargar
        if (Notification.permission !== "granted") {
            Notification.requestPermission();
        }

        function addTask() {
            const name = document.getElementById('taskInput').value;
            const time = document.getElementById('timeInput').value;

            if (!name || !time) {
                alert("Por favor, completa todos los campos del sistema.");
                return;
            }

            const task = {
                id: Date.now(),
                name: name,
                time: new Date(time).getTime(),
                notified: false
            };

            tasks.push(task);
            renderTasks();
            
            // Limpiar inputs
            document.getElementById('taskInput').value = '';
            document.getElementById('timeInput').value = '';
        }

        function renderTasks() {
            const list = document.getElementById('taskList');
            list.innerHTML = '';

            // Ordenar por tiempo
            tasks.sort((a, b) => a.time - b.time);

            tasks.forEach(task => {
                const date = new Date(task.time).toLocaleString();
                const li = document.createElement('li');
                li.className = 'task-item';
                li.innerHTML = `
                    <div class="task-info">
                        <span class="task-name">${task.name}</span>
                        <span class="task-time">${date}</span>
                    </div>
                    <button class="delete-btn" onclick="deleteTask(${task.id})">ELIMINAR</button>
                `;
                list.appendChild(li);
            });
        }

        function deleteTask(id) {
            tasks = tasks.filter(t => t.id !== id);
            renderTasks();
        }

        // Sistema de monitoreo de alarmas (corre cada segundo)
        setInterval(() => {
            const now = new Date().getTime();

            tasks.forEach(task => {
                // Si falta menos de 1 minuto o ya pasó la hora y no ha sido notificado
                if (now >= task.time && !task.notified) {
                    triggerAlarm(task);
                    task.notified = true;
                }
            });
        }, 1000);

        function triggerAlarm(task) {
            const audio = document.getElementById('alarmSound');
            audio.play();

            // Notificación de navegador
            if (Notification.permission === "granted") {
                new Notification("ALERTA FLASHFOCUS", {
                    body: `Es hora de: ${task.name}`,
                    icon: "https://cdn-icons-png.flaticon.com/512/559/559332.png"
                });
            }

            alert(`SISTEMA FLASHFOCUS:\n\nRecordatorio urgente: ${task.name}`);
        }
    </script>
</body>
</html>
