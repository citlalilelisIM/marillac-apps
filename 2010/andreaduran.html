<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Maze Runner: Edición Andrea</title>
    <style>
        :root {
            --morado-pastel: #e0b0ff;
            --rosa-pastel: #ffb7ce;
            --cyan-pastel: #a2e1db;
            --amarillo-pastel: #fff9ae;
        }
        body {
            background-color: var(--morado-pastel);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
        }
        #game-wrapper {
            position: relative;
            background: #2a2a2a;
            border: 8px solid white;
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
        }
        canvas { display: block; image-rendering: pixelated; }
        .ui {
            position: absolute;
            top: -45px;
            width: 100%;
            display: flex;
            justify-content: space-around;
            color: #4b0082;
            font-weight: bold;
            font-size: 1.2rem;
        }
        .pantalla {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(75, 0, 130, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            z-index: 100;
            text-align: center;
        }
        button {
            padding: 15px 40px;
            background: var(--rosa-pastel);
            border: none;
            color: #4b0082;
            font-size: 1.5rem;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 4px 4px 0px white;
            margin-top: 20px;
        }
        button:hover { transform: scale(1.05); background: white; }
        .hidden { display: none !important; }
        .autor { margin-top: 15px; color: #4b0082; font-weight: bold; }
    </style>
</head>
<body>

    <div id="game-wrapper">
        <div class="ui">
            <div>TIEMPO: <span id="timer">30</span>s</div>
            <div>NIVEL: <span id="lvl">1</span></div>
            <div>PTOS: <span id="pts">0</span></div>
        </div>

        <canvas id="canvas" width="600" height="600"></canvas>

        <div id="pantalla-inicio" class="pantalla">
            <h1 style="font-size: 3rem;">MAZE RUNNER</h1>
            <p>Ayuda a la chica a escapar<br>Usa las FLECHAS del teclado</p>
            <button onclick="iniciarJuego()">¡EMPEZAR!</button>
        </div>

        <div id="pantalla-fin" class="pantalla hidden">
            <h1 id="msg-fin">¡FIN DEL JUEGO!</h1>
            <p>Puntuación: <span id="pts-final">0</span></p>
            <button onclick="resetear()">REINTENTAR</button>
        </div>
    </div>

    <div class="autor">Creado por Andrea</div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        let nivel = 1, puntos = 0, tiempo = 30, activo = false, bucle, crono;
        const jugador = { x: 40, y: 40, w: 24, h: 32, vel: 4 };
        let paredes = [], trampas = [], monedas = [];

        const teclas = {};
        window.onkeydown = (e) => teclas[e.code] = true;
        window.onkeyup = (e) => teclas[e.code] = false;

        function sonar(f, d) {
            const ac = new (window.AudioContext || window.webkitAudioContext)();
            const o = ac.createOscillator();
            const g = ac.createGain();
            o.frequency.value = f;
            o.connect(g); g.connect(ac.destination);
            o.start(); g.gain.exponentialRampToValueAtTime(0.00001, ac.currentTime + d);
            o.stop(ac.currentTime + d);
        }

        function generarNivel() {
            paredes = []; trampas = []; monedas = [];
            // Bordes
            paredes.push({x:0,y:0,w:600,h:10}, {x:0,y:590,w:600,h:10}, {x:0,y:0,w:10,h:600}, {x:590,y:0,w:10,h:600});

            // Obstáculos
            for(let i=0; i < 20 + (nivel * 4); i++) {
                let px = Math.floor(Math.random()*11)*50 + 20;
                let py = Math.floor(Math.random()*11)*50 + 20;
                // Zona segura: inicio (top-left) y fin (bottom-right)
                if((px < 120 && py < 120) || (px > 450 && py > 450)) continue;
                paredes.push({x: px, y: py, w: Math.random()>0.5?80:20, h: Math.random()>0.5?20:80});
            }

            // Trampas rojas móviles
            for(let i=0; i < nivel + 1; i++) {
                trampas.push({
                    x: Math.random()*300+100, y: Math.random()*300+100,
                    w: 60, h: 6, v: (1 + nivel), dir: 1, origen: 0
                });
                trampas[i].origen = trampas[i].x;
            }

            // Monedas
            for(let i=0; i<6; i++) {
                monedas.push({x: Math.random()*500+50, y: Math.random()*500+50, r: 8, activa: true});
            }

            jugador.x = 30; jugador.y = 30;
            tiempo = Math.max(10, 35 - (nivel * 2));
            document.getElementById('timer').innerText = tiempo;
        }

        function dibujarPersonaje() {
            // Pelo café
            ctx.fillStyle = "#5d3a1a";
            ctx.fillRect(jugador.x, jugador.y, jugador.w, 12);
            // Piel
            ctx.fillStyle = "#ffdbac";
            ctx.fillRect(jugador.x+4, jugador.y+12, jugador.w-8, 6);
            // Camiseta colorida (Cian Pastel)
            ctx.fillStyle = "#a2e1db";
            ctx.fillRect(jugador.x+2, jugador.y+18, jugador.w-4, 10);
            // Falda/Pantalón (Rosa Pastel)
            ctx.fillStyle = "#ffb7ce";
            ctx.fillRect(jugador.x+4, jugador.y+28, jugador.w-8, 4);
        }

        function actualizar() {
            if(!activo) return;

            let nx = jugador.x, ny = jugador.y;
            if(teclas['ArrowUp']) ny -= jugador.vel;
            if(teclas['ArrowDown']) ny += jugador.vel;
            if(teclas['ArrowLeft']) nx -= jugador.vel;
            if(teclas['ArrowRight']) nx += jugador.vel;

            // Colisión paredes
            let choca = paredes.some(p => nx < p.x+p.w && nx+jugador.w > p.x && ny < p.y+p.h && ny+jugador.h > p.y);
            if(!choca) { jugador.x = nx; jugador.y = ny; }

            // Trampas
            trampas.forEach(t => {
                t.x += t.v * t.dir;
                if(Math.abs(t.x - t.origen) > 100) t.dir *= -1;
                
                if(Math.floor(Date.now()/200)%2==0 && nx < t.x+t.w && nx+jugador.w > t.x && ny < t.y+t.h && ny+jugador.h > t.y) {
                    finalizar("¡RAYOS ROJOS!");
                }
            });

            // Monedas
            monedas.forEach(m => {
                if(m.activa && Math.hypot(jugador.x - m.x, jugador.y - m.y) < 25) {
                    m.activa = false; puntos += 100; sonar(800, 0.1);
                    document.getElementById('pts').innerText = puntos;
                }
            });

            // Meta
            if(jugador.x > 540 && jugador.y > 540) {
                nivel++; puntos += 500; sonar(1000, 0.2);
                document.getElementById('lvl').innerText = nivel;
                generarNivel();
            }

            renderizar();
            bucle = requestAnimationFrame(actualizar);
        }

        function renderizar() {
            ctx.fillStyle = "#1a1a1a";
            ctx.fillRect(0, 0, 600, 600);

            // Paredes
            ctx.fillStyle = "#4b4b4b";
            paredes.forEach(p => ctx.fillRect(p.x, p.y, p.w, p.h));

            // Monedas
            ctx.fillStyle = "#fff9ae";
            monedas.forEach(m => { if(m.activa) { ctx.beginPath(); ctx.arc(m.x, m.y, m.r, 0, 7); ctx.fill(); }});

            // Trampas
            if(Math.floor(Date.now()/200)%2==0) {
                ctx.fillStyle = "#ff4444";
                trampas.forEach(t => ctx.fillRect(t.x, t.y, t.w, t.h));
            }

            // Salida (Verde Pastel)
            ctx.fillStyle = "#b1ffb1";
            ctx.fillRect(550, 550, 40, 40);

            dibujarPersonaje();
        }

        function iniciarJuego() {
            activo = true;
            document.getElementById('pantalla-inicio').classList.add('hidden');
            generarNivel();
            actualizar();
            crono = setInterval(() => {
                if(activo) {
                    tiempo--;
                    document.getElementById('timer').innerText = tiempo;
                    if(tiempo <= 0) finalizar("¡TIEMPO AGOTADO!");
                }
            }, 1000);
            sonar(440, 0.2);
        }

        function finalizar(msg) {
            activo = false;
            clearInterval(crono);
            cancelAnimationFrame(bucle);
            document.getElementById('pantalla-fin').classList.remove('hidden');
            document.getElementById('msg-fin').innerText = msg;
            document.getElementById('pts-final').innerText = puntos;
            sonar(150, 0.5);
        }

        function resetear() { location.reload(); }
    </script>
</body>
</html>
