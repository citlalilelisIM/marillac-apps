<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pulpis: Banquete Masivo</title>
    <style>
        * { margin: 0; padding: 0; overflow: hidden; }
        body { background: #000; font-family: 'Arial Rounded MT Bold', sans-serif; }
        canvas { display: block; background: radial-gradient(circle at center, #001d3d 0%, #000 100%); }

        .ui-container {
            position: absolute;
            top: 20px; width: 100%;
            display: flex; flex-direction: column; align-items: center;
            pointer-events: none; z-index: 10;
        }

        #score-display { color: #4cc9f0; font-size: 3.5rem; font-weight: 900; text-shadow: 0 0 15px #4cc9f0; }
        
        .energy-bar-bg { width: 300px; height: 15px; background: rgba(255,255,255,0.2); border-radius: 10px; margin-top: 10px; overflow: hidden; border: 2px solid #fff; }
        #energy-fill { width: 100%; height: 100%; background: #06d6a0; transition: width 0.2s; box-shadow: 0 0 10px #06d6a0; }

        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); display: flex; flex-direction: column;
            justify-content: center; align-items: center; color: white; z-index: 20;
        }

        h1 { font-size: 5rem; color: #4cc9f0; text-shadow: 0 0 20px #4cc9f0; margin-bottom: 5px; }
        p { font-size: 1.3rem; margin-bottom: 30px; text-align: center; color: #94d2bd; }
        
        button {
            background: #4cc9f0; color: black; border: none; padding: 15px 50px;
            font-size: 2rem; font-weight: bold; border-radius: 50px; cursor: pointer;
            box-shadow: 0 5px 0 #3a96b4; transition: 0.2s;
        }
        button:hover { transform: scale(1.05); background: #fff; }
    </style>
</head>
<body>

    <div class="ui-container">
        <div id="score-display">0</div>
        <div class="energy-bar-bg"><div id="energy-fill"></div></div>
    </div>
    
    <div id="overlay">
        <h1>PULPIS</h1>
        <p>¡El mar está lleno de comida!<br>Salta con <b>ESPACIO</b> y devora todo lo que puedas.</p>
        <button onclick="startGame()">¡A COMER!</button>
    </div>

    <canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreDisplay = document.getElementById('score-display');
    const energyFill = document.getElementById('energy-fill');
    const overlay = document.getElementById('overlay');

    let w, h, score, energy, gameActive, frameCount, cameraY, speedMult;
    let strings = [], fishes = [];
    const keys = {};
    const colorPalette = ['#4cc9f0', '#4361ee', '#7209b7', '#f72585', '#ff9f1c', '#06d6a0'];

    const pulpis = { x: 0, y: 0, radius: 30, vy: 0, jumpPower: -16, gravity: 0.5, color: '#4cc9f0' };

    function resize() {
        w = canvas.width = window.innerWidth;
        h = canvas.height = window.innerHeight;
        pulpis.x = w / 2;
    }

    window.addEventListener('resize', resize);
    window.addEventListener('keydown', e => keys[e.code] = true);
    window.addEventListener('keyup', e => keys[e.code] = false);

    function createString(y) { return { y: y, vibration: 0, hue: Math.random() * 360 }; }
    
    function createFish() {
        return {
            x: Math.random() * w,
            y: cameraY - 150 - Math.random() * 600, // Aparecen en un rango más amplio arriba
            r: 10 + Math.random() * 12, // Diferentes tamaños
            speed: (1.5 + Math.random() * 3) * (Math.random() > 0.5 ? 1 : -1) * speedMult,
            hue: Math.random() * 360
        };
    }

    function startGame() {
        resize();
        score = 0; energy = 100; frameCount = 0; speedMult = 1;
        scoreDisplay.innerText = "0";
        strings = []; fishes = [];
        
        const baseLine = h * 0.8;
        const secondLine = baseLine - 200;
        
        for(let i = 0; i < 12; i++) {
            strings.push(createString(baseLine - (i * 200)));
        }
        
        // Iniciar en la segunda cuerda
        pulpis.y = secondLine; 
        pulpis.vy = 0;
        cameraY = pulpis.y - h * 0.6;
        
        // Crear una población inicial de peces
        for(let i = 0; i < 15; i++) fishes.push(createFish());
        
        gameActive = true;
        overlay.style.display = 'none';
        update();
    }

    function drawPulpis() {
        ctx.save();
        ctx.translate(0, -cameraY);
        pulpis.color = colorPalette[Math.floor(score / 100) % colorPalette.length];

        ctx.strokeStyle = pulpis.color; ctx.lineWidth = 5; ctx.lineCap = 'round';
        for(let i = 0; i < 8; i++) {
            let angle = (i * Math.PI * 2) / 8 + (frameCount * 0.05);
            ctx.beginPath();
            ctx.moveTo(pulpis.x, pulpis.y);
            let tx = pulpis.x + Math.cos(angle) * 40;
            let ty = pulpis.y + 40 + Math.sin(frameCount * 0.1 + i) * 10;
            ctx.quadraticCurveTo(pulpis.x + Math.cos(angle)*20, pulpis.y + 20, tx, ty);
            ctx.stroke();
        }

        ctx.shadowBlur = 15; ctx.shadowColor = pulpis.color;
        ctx.fillStyle = pulpis.color;
        ctx.beginPath(); ctx.arc(pulpis.x, pulpis.y, pulpis.radius, 0, Math.PI * 2); ctx.fill();
        ctx.restore();
    }

    function drawFish(f) {
        ctx.save();
        ctx.translate(0, -cameraY);
        ctx.fillStyle = `hsl(${f.hue}, 80%, 60%)`;
        ctx.shadowBlur = 10; ctx.shadowColor = `hsl(${f.hue}, 80%, 50%)`;
        
        ctx.beginPath(); ctx.ellipse(f.x, f.y, f.r, f.r/1.6, 0, 0, Math.PI*2); ctx.fill();
        ctx.beginPath();
        let tailDir = f.speed > 0 ? -1 : 1;
        ctx.moveTo(f.x + (f.r * tailDir), f.y);
        ctx.lineTo(f.x + (f.r+f.r*0.8)*tailDir, f.y-(f.r/1.5));
        ctx.lineTo(f.x + (f.r+f.r*0.8)*tailDir, f.y+(f.r/1.5));
        ctx.fill();
        ctx.restore();
    }

    function update() {
        if(!gameActive) return;
        ctx.clearRect(0, 0, w, h);
        frameCount++;

        if(score >= 2000) speedMult = 1.8;

        // El hambre baja un poco más lento para compensar el caos de peces
        energy -= 0.07 * speedMult;
        energyFill.style.width = energy + "%";
        if(energy <= 0) gameOver("¡HAMBRE EXTREMA!");

        pulpis.vy += pulpis.gravity * speedMult;
        pulpis.y += pulpis.vy;
        if(keys['ArrowLeft'] || keys['KeyA']) pulpis.x -= 8;
        if(keys['ArrowRight'] || keys['KeyD']) pulpis.x += 8;
        if(pulpis.x < 0) pulpis.x = w; if(pulpis.x > w) pulpis.x = 0;

        let targetCameraY = pulpis.y - h * 0.6;
        cameraY += (targetCameraY - cameraY) * 0.1;

        // Cuerdas
        strings.forEach((s, i) => {
            ctx.strokeStyle = `hsla(${s.hue}, 70%, 60%, 0.6)`;
            ctx.lineWidth = 6;
            ctx.beginPath();
            let vib = Math.sin(frameCount * 0.4) * s.vibration;
            ctx.moveTo(0, s.y - cameraY + vib); ctx.lineTo(w, s.y - cameraY - vib);
            ctx.stroke();
            if(s.vibration > 0) s.vibration *= 0.9;

            if(pulpis.vy > 0 && Math.abs(pulpis.y - s.y) < 30) {
                if(keys['Space'] || keys['ArrowUp'] || keys['KeyW']) {
                    pulpis.vy = pulpis.jumpPower * (score >= 2000 ? 1.1 : 1);
                    s.vibration = 35;
                    score += 5; scoreDisplay.innerText = score;
                }
            }
            if(s.y > cameraY + h + 200) {
                strings.splice(i, 1);
                strings.push(createString(strings[strings.length-1].y - 200));
            }
        });

        // MAS PECES: Aparecen con más frecuencia (cada 25 frames en lugar de 50)
        if(frameCount % 25 === 0) fishes.push(createFish());
        
        fishes.forEach((f, i) => {
            f.x += f.speed;
            if(f.x < -50 || f.x > w + 50) f.speed *= -1;
            drawFish(f);
            
            if(Math.hypot(pulpis.x - f.x, pulpis.y - f.y) < pulpis.radius + f.r) {
                fishes.splice(i, 1);
                energy = Math.min(100, energy + 20); // Cada pez da un poco menos para incentivar cazar muchos
                score += 50; scoreDisplay.innerText = score;
            }
            if(f.y > cameraY + h + 200) fishes.splice(i, 1);
        });

        drawPulpis();
        if(pulpis.y > cameraY + h + 300) gameOver("¡CAÍSTE AL ABISMO!");
        requestAnimationFrame(update);
    }

    function gameOver(reason) {
        gameActive = false;
        overlay.style.display = 'flex';
        overlay.innerHTML = `<h1 style="color:#f72585">FIN</h1><p>${reason}<br>Puntos: ${score}</p><button onclick="startGame()">REINTENTAR</button>`;
    }

    resize();
</script>
</body>
</html>
