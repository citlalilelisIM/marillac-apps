<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Neon Slide Puzzle</title>
    <style>
        :root {
            --bg: #050505;
            --tile: #1a1a1a;
            --border: #0ff;
            --text: #0ff;
            --empty: #000;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Courier New', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        h1 { text-shadow: 0 0 10px var(--border); margin-bottom: 10px; }

        .stats { margin-bottom: 20px; font-size: 1.2rem; }

        #puzzle-grid {
            display: grid;
            grid-template-columns: repeat(3, 100px);
            grid-template-rows: repeat(3, 100px);
            gap: 10px;
            border: 4px solid var(--border);
            padding: 10px;
            box-shadow: 0 0 20px var(--border);
            border-radius: 8px;
        }

        .tile {
            width: 100px;
            height: 100px;
            background: var(--tile);
            border: 2px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: bold;
            cursor: pointer;
            user-select: none;
            transition: transform 0.1s, background 0.2s;
            box-shadow: inset 0 0 10px rgba(0, 255, 255, 0.2);
        }

        .tile:hover { background: #222; transform: scale(1.02); }

        .tile.empty {
            background: var(--empty);
            border-color: #333;
            cursor: default;
            box-shadow: none;
        }

        .tile.empty:hover { transform: none; }

        button {
            margin-top: 30px;
            background: transparent;
            border: 2px solid #f0f;
            color: #f0f;
            padding: 10px 25px;
            font-family: inherit;
            font-size: 1rem;
            cursor: pointer;
            box-shadow: 0 0 10px #f0f;
            transition: 0.3s;
        }

        button:hover { background: #f0f; color: #000; }

        #win-message {
            margin-top: 20px;
            color: #39ff14;
            display: none;
            text-shadow: 0 0 10px #39ff14;
            font-size: 1.5rem;
            animation: blink 1s infinite;
        }

        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>

    <h1>NEON SLIDE</h1>
    
    <div class="stats">MOVIMIENTOS: <span id="moves">0</span></div>

    <div id="puzzle-grid"></div>

    <div id="win-message">¡SISTEMA RESTAURADO!</div>

    <button onclick="shuffleGame()">REINICIAR / MEZCLAR</button>

    <script>
        const grid = document.getElementById('puzzle-grid');
        const movesEl = document.getElementById('moves');
        const winEl = document.getElementById('win-message');
        
        let tiles = [1, 2, 3, 4, 5, 6, 7, 8, 0]; // 0 representa el espacio vacío
        let moves = 0;

        function createGrid() {
            grid.innerHTML = '';
            tiles.forEach((tile, index) => {
                const tileDiv = document.createElement('div');
                tileDiv.classList.add('tile');
                if (tile === 0) {
                    tileDiv.classList.add('empty');
                    tileDiv.textContent = '';
                } else {
                    tileDiv.textContent = tile;
                    tileDiv.onclick = () => moveTile(index);
                }
                grid.appendChild(tileDiv);
            });
        }

        function moveTile(index) {
            const emptyIndex = tiles.indexOf(0);
            const validMoves = [index - 1, index + 1, index - 3, index + 3];

            // Evitar saltos de línea laterales (ej: de posición 2 a 3)
            const isAdj = validMoves.includes(emptyIndex);
            const isSameRow = Math.floor(index / 3) === Math.floor(emptyIndex / 3);
            const isSameCol = (index % 3) === (emptyIndex % 3);

            if (isAdj && (isSameRow || isSameCol)) {
                [tiles[index], tiles[emptyIndex]] = [tiles[emptyIndex], tiles[index]];
                moves++;
                movesEl.textContent = moves;
                createGrid();
                checkWin();
            }
        }

        function shuffleGame() {
            // Mezcla simple pero garantizando que sea resoluble
            for (let i = 0; i < 200; i++) {
                const emptyIndex = tiles.indexOf(0);
                const adj = [];
                if (emptyIndex % 3 > 0) adj.push(emptyIndex - 1); // Izquierda
                if (emptyIndex % 3 < 2) adj.push(emptyIndex + 1); // Derecha
                if (emptyIndex > 2) adj.push(emptyIndex - 3);     // Arriba
                if (emptyIndex < 6) adj.push(emptyIndex + 3);     // Abajo
                
                const randomTarget = adj[Math.floor(Math.random() * adj.length)];
                [tiles[emptyIndex], tiles[randomTarget]] = [tiles[randomTarget], tiles[emptyIndex]];
            }
            moves = 0;
            movesEl.textContent = moves;
            winEl.style.display = 'none';
            createGrid();
        }

        function checkWin() {
            const winState = [1, 2, 3, 4, 5, 6, 7, 8, 0];
            const hasWon = tiles.every((val, index) => val === winState[index]);
            if (hasWon && moves > 0) {
                winEl.style.display = 'block';
            }
        }

        // Iniciar
        shuffleGame();
    </script>
</body>
</html>
