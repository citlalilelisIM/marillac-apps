<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garf Clicker: Casa Gourmet</title>
    <style>
        :root {
            --orange: #ff9d00;
            --wall: #fceabb;
            --floor: #a0522d;
            --ui-bg: rgba(255, 255, 255, 0.95);
        }

        body {
            margin: 0; padding: 0; overflow: hidden;
            font-family: 'Comic Sans MS', cursive;
            background-color: var(--floor);
        }

        #game-scene {
            width: 100vw; height: 100vh;
            background: linear-gradient(to bottom, var(--wall) 65%, var(--floor) 65%);
            position: relative; border: 10px solid #4e2b16; box-sizing: border-box;
        }

        /* Marcador de Peces */
        #ui-top {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            background: var(--ui-bg); padding: 10px 40px; border-radius: 50px;
            border: 4px solid var(--orange); font-size: 32px;
            box-shadow: 0 5px 0 #d35400; z-index: 1000;
        }

        /* Garfield */
        #garf-entity {
            position: absolute; width: 180px; height: 200px;
            cursor: pointer; z-index: 500; transition: transform 0.1s;
        }

        .walking { animation: waddle 0.3s infinite alternate; }
        @keyframes waddle { from { transform: rotate(-5deg); } to { transform: rotate(5deg); } }

        /* Comida en el escenario */
        .food-item {
            position: absolute;
            font-size: 40px;
            filter: drop-shadow(2px 4px 0 rgba(0,0,0,0.2));
            animation: spawn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 100;
            user-select: none;
        }

        @keyframes spawn { from { transform: scale(0); rotate: -45deg; } to { transform: scale(1); rotate: 0deg; } }

        /* Tienda */
        #shop {
            position: absolute; right: 20px; top: 20px; width: 260px;
            max-height: 85vh; overflow-y: auto;
            background: var(--ui-bg); border: 4px solid #333;
            border-radius: 20px; padding: 15px; box-shadow: 8px 8px 0 rgba(0,0,0,0.2);
            z-index: 2000;
        }

        .item { margin-bottom: 12px; padding: 12px; border: 2px solid #eee; border-radius: 12px; background: #fff; }
        .locked { display: none; }
        .unlocked { display: block; animation: popIn 0.4s forwards; }

        @keyframes popIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .upgrade-btn {
            width: 100%; padding: 10px; background: var(--orange);
            color: white; border: none; border-bottom: 4px solid #d35400;
            border-radius: 10px; cursor: pointer; font-family: inherit; font-weight: bold;
        }

        .upgrade-btn:disabled { background: #bbb; border-bottom-color: #888; }

        .fish-particle {
            position: absolute; font-size: 40px; pointer-events: none;
            animation: flyAway 1s forwards; z-index: 3000;
        }
        @keyframes flyAway { to { opacity: 0; transform: translate(var(--x), -120px) rotate(30deg); } }

        .stats-box { font-size: 12px; color: #444; border-top: 2px solid #eee; padding-top: 10px; margin-top: 10px; }
    </style>
</head>
<body>

<div id="game-scene">
    <div id="ui-top">🐟 <span id="fish-count">0</span></div>

    <div id="garf-entity">
        <svg viewBox="0 0 200 250" xmlns="http://www.w3.org/2000/svg">
            <path d="M60 50 L40 10 L90 40 Z" fill="#ff9d00" stroke="#000" stroke-width="4"/>
            <path d="M140 50 L160 10 L110 40 Z" fill="#ff9d00" stroke="#000" stroke-width="4"/>
            <ellipse cx="100" cy="160" rx="65" ry="75" fill="#ff9d00" stroke="#000" stroke-width="5"/>
            <ellipse cx="60" cy="225" rx="25" ry="15" fill="#ff9d00" stroke="#000" stroke-width="4"/>
            <ellipse cx="140" cy="225" rx="25" ry="15" fill="#ff9d00" stroke="#000" stroke-width="4"/>
            <ellipse cx="100" cy="80" rx="60" ry="50" fill="#ff9d00" stroke="#000" stroke-width="5"/>
            <ellipse cx="80" cy="70" rx="18" ry="22" fill="#fff" stroke="#000" stroke-width="3"/>
            <ellipse cx="120" cy="70" rx="18" ry="22" fill="#fff" stroke="#000" stroke-width="3"/>
            <circle cx="85" cy="75" r="4" fill="#000"/><circle cx="115" cy="75" r="4" fill="#000"/>
            <ellipse cx="100" cy="95" rx="8" ry="6" fill="#ff66b2" stroke="#000" stroke-width="2"/>
        </svg>
    </div>

    <div id="shop">
        <h3 style="margin:0; text-align:center;">Menú Gourmet</h3>
        
        <div id="item-base" class="item unlocked">
            <h4>🍝 Lasaña (+25%)</h4>
            <button class="upgrade-btn" onclick="buyUpgrade('base')">Comprar<br><span id="cost-base">15</span> 🐟</button>
        </div>

        <div id="item-extra" class="item locked">
            <h4>🥪 Sándwich XL (+50%)</h4>
            <button class="upgrade-btn" onclick="buyUpgrade('extra')">Comprar<br><span id="cost-extra">150</span> 🐟</button>
        </div>

        <div id="item-mega" class="item locked">
            <h4>🍕 Pizza Fiesta (+100%)</h4>
            <button class="upgrade-btn" onclick="buyUpgrade('mega')">Comprar<br><span id="cost-mega">600</span> 🐟</button>
        </div>
        
        <div class="stats-box">
            Peces/Clic: <span id="val-click">1</span><br>
            Peces totales: <span id="val-total">0</span>
        </div>
    </div>
</div>

<script>
    let fish = 0;
    let totalCollected = 0;
    let fishPerClick = 1;
    
    const shopData = {
        base: { cost: 15, power: 1.25, unlockAt: 0, emoji: '🍝' },
        extra: { cost: 150, power: 1.50, unlockAt: 100, emoji: '🥪' },
        mega: { cost: 600, power: 2.00, unlockAt: 500, emoji: '🍕' }
    };

    const garf = document.getElementById('garf-entity');
    const scene = document.getElementById('game-scene');

    // Movimiento IA
    let tx = window.innerWidth/2, ty = window.innerHeight/2;
    function walk() {
        tx = Math.random() * (window.innerWidth - 200);
        ty = (window.innerHeight * 0.5) + (Math.random() * (window.innerHeight * 0.3));
        const dur = 3000 + Math.random()*2000;
        garf.style.transition = `all ${dur}ms linear`;
        garf.style.left = tx + 'px'; 
        garf.style.top = ty + 'px';
        
        // Voltear
        const currentLeft = parseFloat(garf.style.left || 0);
        garf.style.transform = `scaleX(${tx > currentLeft ? -1 : 1})`;
        
        garf.classList.add('walking');
        setTimeout(() => { 
            garf.classList.remove('walking'); 
            setTimeout(walk, 1000); 
        }, dur);
    }

    // Clic en Garfield
    garf.addEventListener('mousedown', (e) => {
        fish += fishPerClick;
        totalCollected += fishPerClick;
        updateUI();
        spawnParticle(e.clientX, e.clientY, '🐟');
        
        garf.style.transform += " scale(0.8)";
        setTimeout(() => {
            garf.style.transform = garf.style.transform.replace(" scale(0.8)", "");
        }, 100);
    });

    function spawnParticle(x, y, emoji) {
        const p = document.createElement('div');
        p.className = 'fish-particle'; p.innerText = emoji;
        p.style.left = x + 'px'; p.style.top = y + 'px';
        p.style.setProperty('--x', (Math.random()-0.5)*120 + 'px');
        document.body.appendChild(p);
        setTimeout(() => p.remove(), 1000);
    }

    // Aparecer comida en el escenario
    function placeFoodInScene(emoji) {
        const food = document.createElement('div');
        food.className = 'food-item';
        food.innerText = emoji;
        
        // Posición aleatoria en la zona del suelo
        const x = Math.random() * (window.innerWidth - 60);
        const y = (window.innerHeight * 0.65) + (Math.random() * (window.innerHeight * 0.25));
        
        food.style.left = x + 'px';
        food.style.top = y + 'px';
        
        scene.appendChild(food);
    }

    function buyUpgrade(key) {
        const up = shopData[key];
        if(fish >= up.cost) {
            fish -= up.cost;
            fishPerClick = parseFloat((fishPerClick * up.power).toFixed(2));
            up.cost = Math.round(up.cost * 1.8);
            
            // ¡NUEVO! Ponemos la comida en el escenario
            placeFoodInScene(up.emoji);
            
            updateUI();
        }
    }

    function updateUI() {
        document.getElementById('fish-count').innerText = Math.floor(fish);
        document.getElementById('val-click').innerText = fishPerClick;
        document.getElementById('val-total').innerText = Math.floor(totalCollected);

        for(let key in shopData) {
            const data = shopData[key];
            const btn = document.querySelector(`[onclick="buyUpgrade('${key}')"]`);
            const container = document.getElementById(`item-${key}`);
            const costLabel = document.getElementById(`cost-${key}`);

            if(totalCollected >= data.unlockAt) {
                container.classList.remove('locked');
                container.classList.add('unlocked');
            }

            costLabel.innerText = data.cost;
            btn.disabled = (fish < data.cost);
        }
    }

    walk();
    updateUI();
</script>
</body>
</html>
