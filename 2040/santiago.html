<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>PUNK ROCK HERO - FULL CONTROLS</title>
    <style>
        :root {
            --bg-color: #050505;
            --red: #ff0055;
            --green: #00ff66;
            --blue: #00ccff;
            --yellow: #fefe33;
        }

        body {
            margin: 0; background-color: var(--bg-color);
            color: white; font-family: 'Arial Black', sans-serif;
            overflow: hidden; display: flex; flex-direction: column;
            align-items: center; height: 100vh;
            user-select: none; touch-action: manipulation;
        }

        /* UI SUPERIOR */
        #ui {
            position: absolute; top: 10px; width: 95%;
            display: flex; justify-content: space-between; z-index: 100;
        }
        .stat-box { 
            background: rgba(0,0,0,0.9); padding: 10px; 
            border: 2px solid #fff; box-shadow: 4px 4px 0 var(--red);
            text-align: center; min-width: 120px;
        }

        /* AREA DE JUEGO 3D */
        #viewport {
            perspective: 1000px; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: flex-end;
            padding-bottom: 20px;
        }

        #game-container {
            position: relative; width: 400px; height: 150vh;
            background: linear-gradient(180deg, #000 0%, #111 100%);
            transform: rotateX(45deg); transform-origin: bottom;
            border-left: 6px solid #444; border-right: 6px solid #444;
            overflow: hidden;
        }

        .lane-mark {
            position: absolute; top: 0; bottom: 0; width: 2px;
            background: rgba(255,255,255,0.05);
        }

        /* LOS BOTONES (TARGETS) */
        #targets {
            position: absolute; bottom: 120px; width: 100%;
            display: flex; justify-content: space-around;
            padding: 0 10px; box-sizing: border-box; z-index: 50;
        }

        .target {
            width: 75px; height: 75px; border: 5px solid #444;
            border-radius: 50%; display: flex; align-items: center;
            justify-content: center; font-size: 2.2rem;
            background: rgba(0,0,0,0.8); transition: 0.1s;
            cursor: pointer; /* Para que parezca botón */
        }

        #t-0 { border-color: var(--green); color: var(--green); }
        #t-1 { border-color: var(--red); color: var(--red); }
        #t-2 { border-color: var(--yellow); color: var(--yellow); }
        #t-3 { border-color: var(--blue); color: var(--blue); }

        .target.active {
            transform: scale(1.3) translateZ(50px);
            background: white !important; color: black !important;
            box-shadow: 0 0 50px white !important;
        }

        /* NOTAS */
        .note {
            position: absolute; width: 75px; height: 35px;
            border-radius: 8px; z-index: 10;
        }
        .c-0 { background: var(--green); box-shadow: 0 0 20px var(--green); }
        .c-1 { background: var(--red); box-shadow: 0 0 20px var(--red); }
        .c-2 { background: var(--yellow); box-shadow: 0 0 20px var(--yellow); }
        .c-3 { background: var(--blue); box-shadow: 0 0 20px var(--blue); }

        /* OVERLAYS */
        #overlay {
            position: absolute; inset: 0; background: rgba(0,0,0,0.95);
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; z-index: 1000; text-align: center;
        }
        .btn-rock {
            padding: 20px 50px; font-size: 2.5rem; background: var(--red);
            color: white; border: none; cursor: pointer;
            box-shadow: 8px 8px 0 var(--blue);
        }
    </style>
</head>
<body>

    <div id="ui">
        <div class="stat-box">
            <div id="score" style="font-size: 1.8rem;">000000</div>
            <div id="combo" style="color:var(--yellow)">COMBO x0</div>
        </div>
        <div class="stat-box">
            <div style="font-size: 0.7rem;">VIDAS</div>
            <div id="lives">❤️❤️❤️❤️❤️❤️❤️❤️❤️❤️</div>
        </div>
    </div>

    <div id="overlay">
        <h1 style="font-size:4rem; margin:0;">ROCK <span style="color:var(--red)">HERO</span></h1>
        <p style="margin:20px;">USA LAS FLECHAS O TOCA LOS BOTONES</p>
        <button class="btn-rock" onclick="initAudioAndStart()">EMPEZAR</button>
    </div>

    <div id="viewport">
        <div id="game-container">
            <div class="lane-mark" style="left: 25%;"></div>
            <div class="lane-mark" style="left: 50%;"></div>
            <div class="lane-mark" style="left: 75%;"></div>
            
            <div id="notes-container"></div>

            <div id="targets">
                <div class="target" id="t-0" onmousedown="handleInput(0)" ontouchstart="handleInput(0)">←</div>
                <div class="target" id="t-1" onmousedown="handleInput(1)" ontouchstart="handleInput(1)">↑</div>
                <div class="target" id="t-2" onmousedown="handleInput(2)" ontouchstart="handleInput(2)">↓</div>
                <div class="target" id="t-3" onmousedown="handleInput(3)" ontouchstart="handleInput(3)">→</div>
            </div>
        </div>
    </div>

    <script>
        let audioCtx, masterGain, nextNoteTime = 0, bpm = 140, gameActive = false;
        let score = 0, combo = 0, misses = 0, speed = 8, notes = [];
        const laneKeys = ['ArrowLeft', 'ArrowUp', 'ArrowDown', 'ArrowRight'];
        const laneX = [10, 110, 210, 310];

        function initAudioAndStart() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                masterGain = audioCtx.createGain();
                masterGain.connect(audioCtx.destination);
            }
            startGame();
        }

        function playSound(time, freq, type, vol, dur) {
            const osc = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, time);
            g.gain.setValueAtTime(vol, time);
            g.gain.exponentialRampToValueAtTime(0.01, time + dur);
            osc.connect(g); g.connect(masterGain);
            osc.start(time); osc.stop(time + dur);
        }

        function startGame() {
            document.getElementById('overlay').style.display = 'none';
            score = 0; combo = 0; misses = 0; speed = 8; bpm = 140;
            notes = [];
            document.getElementById('notes-container').innerHTML = '';
            gameActive = true;
            updateUI();
            nextNoteTime = audioCtx.currentTime;
            scheduler();
            gameLoop();
        }

        function scheduler() {
            while (nextNoteTime < audioCtx.currentTime + 0.1 && gameActive) {
                playSound(nextNoteTime, 60, 'sine', 0.5, 0.1); // Kick
                if (Math.random() > 0.4) {
                    const lane = Math.floor(Math.random() * 4);
                    const nEl = document.createElement('div');
                    nEl.className = `note c-${lane}`;
                    nEl.style.left = laneX[lane] + 'px';
                    document.getElementById('notes-container').appendChild(nEl);
                    notes.push({ el: nEl, lane: lane, y: -100, hit: false });
                }
                nextNoteTime += 60.0 / bpm;
            }
            if (gameActive) setTimeout(scheduler, 25);
        }

        function gameLoop() {
            if (!gameActive) return;
            for (let i = notes.length - 1; i >= 0; i--) {
                const n = notes[i];
                n.y += speed;
                n.el.style.top = n.y + 'px';
                if (n.y > 1300) {
                    if (!n.hit) {
                        misses++; combo = 0; updateUI();
                        if (misses >= 10) endGame();
                    }
                    n.el.remove();
                    notes.splice(i, 1);
                }
            }
            requestAnimationFrame(gameLoop);
        }

        // Función unificada para Teclado, Mouse y Touch
        function handleInput(idx) {
            if(!gameActive) return;
            const btn = document.getElementById(`t-${idx}`);
            btn.classList.add('active');
            setTimeout(() => btn.classList.remove('active'), 100);
            checkHit(idx);
        }

        function checkHit(lane) {
            const targetY = 950;
            const hitWindow = 140;
            let found = false;
            for (let n of notes) {
                if (n.lane === lane && !n.hit && Math.abs(n.y - targetY) < hitWindow) {
                    n.hit = true; n.el.remove();
                    score += 100 + (combo * 10);
                    combo++; speed += 0.05; bpm += 0.2;
                    updateUI(); found = true; break;
                }
            }
            if (!found) { combo = 0; updateUI(); }
        }

        function updateUI() {
            document.getElementById('score').innerText = score.toString().padStart(6, '0');
            document.getElementById('combo').innerText = `COMBO x${combo}`;
            document.getElementById('lives').innerText = "❤️".repeat(10 - misses) + "🖤".repeat(misses);
        }

        function endGame() {
            gameActive = false;
            document.getElementById('overlay').style.display = 'flex';
            document.getElementById('overlay').innerHTML = `<h1>FIN DEL SHOW</h1><p>SCORE: ${score}</p><button class="btn-rock" onclick="location.reload()">REINTENTAR</button>`;
        }

        // Eventos de teclado
        window.addEventListener('keydown', e => {
            const idx = laneKeys.indexOf(e.key);
            if (idx !== -1) handleInput(idx);
        });
    </script>
</body>
</html>
