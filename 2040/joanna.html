<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Physlet: Tiro Parabólico</title>
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
            --panel: #ffffff;
            --text: #1e293b;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
        }

        h1 { margin-bottom: 10px; color: var(--primary); }

        .container {
            display: flex;
            gap: 20px;
            max-width: 1000px;
            width: 100%;
            background: var(--panel);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .controls {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .canvas-container {
            flex: 2;
            position: relative;
            background: #f1f5f9;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #e2e8f0;
        }

        canvas {
            display: block;
            background-color: #ffffff;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        label { font-weight: 600; font-size: 0.9rem; }

        input[type="range"] { width: 100%; cursor: pointer; }

        .stats {
            margin-top: 10px;
            padding: 15px;
            background: #eff6ff;
            border-radius: 8px;
            border-left: 4px solid var(--primary);
        }

        .stats p { margin: 5px 0; font-size: 0.9rem; }

        button {
            padding: 10px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover { background-color: #1d4ed8; }

        .value-display { font-weight: normal; color: var(--primary); }
    </style>
</head>
<body>

    <h1>Simulador de Tiro Parabólico</h1>

    <div class="container">
        <div class="controls">
            <div class="control-group">
                <label>Ángulo: <span id="angleVal" class="value-display">45</span>°</label>
                <input type="range" id="angleInput" min="0" max="90" value="45">
            </div>

            <div class="control-group">
                <label>Velocidad Inicial: <span id="velVal" class="value-display">50</span> m/s</label>
                <input type="range" id="velInput" min="10" max="100" value="50">
            </div>

            <button id="launchBtn">Lanzar Proyectil</button>
            <button id="resetBtn" style="background-color: #64748b;">Reiniciar</button>

            <div class="stats">
                <p><strong>Altura Máx:</strong> <span id="maxH">-</span> m</p>
                <p><strong>Alcance Máx:</strong> <span id="maxR">-</span> m</p>
                <p><strong>Tiempo Vuelo:</strong> <span id="timeF">-</span> s</p>
            </div>
        </div>

        <div class="canvas-container">
            <canvas id="simCanvas"></canvas>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('simCanvas');
        const ctx = canvas.getContext('2d');
        const angleInput = document.getElementById('angleInput');
        const velInput = document.getElementById('velInput');
        const launchBtn = document.getElementById('launchBtn');
        const resetBtn = document.getElementById('resetBtn');

        // Configuración de escala
        const g = 9.81;
        let animationId;
        let startTime;
        let isRunning = false;

        // Ajustar tamaño del canvas
        function resizeCanvas() {
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = 400;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        function updateLabels() {
            document.getElementById('angleVal').innerText = angleInput.value;
            document.getElementById('velVal').innerText = velInput.value;
        }

        function calculatePhysics() {
            const v0 = parseFloat(velInput.value);
            const theta = parseFloat(angleInput.value) * (Math.PI / 180);

            const tVuelo = (2 * v0 * Math.sin(theta)) / g;
            const hMax = (Math.pow(v0, 2) * Math.pow(Math.sin(theta), 2)) / (2 * g);
            const alcance = (Math.pow(v0, 2) * Math.sin(2 * theta)) / g;

            document.getElementById('maxH').innerText = hMax.toFixed(2);
            document.getElementById('maxR').innerText = alcance.toFixed(2);
            document.getElementById('timeF').innerText = tVuelo.toFixed(2);

            return { v0, theta, tVuelo, alcance, hMax };
        }

        function draw(timestamp) {
            if (!startTime) startTime = timestamp;
            const t = (timestamp - startTime) / 1000; // segundos reales
            const physics = calculatePhysics();
            
            // Factor de escala dinámico para que quepa en el canvas
            const scale = Math.min(canvas.width / (physics.alcance * 1.2 || 1), canvas.height / (physics.hMax * 1.2 || 1));
            const margin = 40;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Trayectoria teórica (línea punteada)
            ctx.beginPath();
            ctx.setLineDash([5, 5]);
            ctx.strokeStyle = '#cbd5e1';
            for (let i = 0; i <= physics.tVuelo; i += 0.05) {
                let px = physics.v0 * Math.cos(physics.theta) * i * scale;
                let py = canvas.height - (physics.v0 * Math.sin(physics.theta) * i - 0.5 * g * i * i) * scale - margin;
                ctx.lineTo(px + margin, py);
            }
            ctx.stroke();
            ctx.setLineDash([]);

            // Proyectil
            if (t <= physics.tVuelo) {
                const x = physics.v0 * Math.cos(physics.theta) * t * scale;
                const y = canvas.height - (physics.v0 * Math.sin(physics.theta) * t - 0.5 * g * t * t) * scale - margin;

                ctx.beginPath();
                ctx.arc(x + margin, y, 6, 0, Math.PI * 2);
                ctx.fillStyle = '#2563eb';
                ctx.fill();
                ctx.closePath();
                
                animationId = requestAnimationFrame(draw);
            } else {
                // Posición final
                const xFinal = physics.alcance * scale;
                ctx.beginPath();
                ctx.arc(xFinal + margin, canvas.height - margin, 6, 0, Math.PI * 2);
                ctx.fillStyle = '#ef4444';
                ctx.fill();
                isRunning = false;
            }
        }

        launchBtn.addEventListener('click', () => {
            if (isRunning) cancelAnimationFrame(animationId);
            isRunning = true;
            startTime = null;
            requestAnimationFrame(draw);
        });

        resetBtn.addEventListener('click', () => {
            cancelAnimationFrame(animationId);
            isRunning = false;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            document.getElementById('maxH').innerText = "-";
            document.getElementById('maxR').innerText = "-";
            document.getElementById('timeF').innerText = "-";
        });

        angleInput.addEventListener('input', updateLabels);
        velInput.addEventListener('input', updateLabels);

        // Dibujar estado inicial
        updateLabels();
    </script>
</body>
</html>
