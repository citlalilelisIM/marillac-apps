<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>GlowDiary ✨ Zodiac</title>
    <style>
        :root {
            --hot-pink: #ff85a1;
            --soft-pink: #ffdae9;
            --pastel-bg: #fce4ec;
            --accent-blue: #bde0fe;
            --zodiac-gold: #f9dcc4;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: -apple-system, system-ui, sans-serif;
            background-color: var(--soft-pink);
            margin: 0;
            display: flex;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        .app-container {
            width: 100%;
            max-width: 430px;
            background: white;
            height: 100%;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        header {
            padding: 50px 25px 15px;
            background: linear-gradient(to bottom, #fff, var(--pastel-bg));
            text-align: center;
        }

        h1 { margin: 0; font-size: 1.6rem; color: var(--hot-pink); }

        .content { flex: 1; overflow-y: auto; padding: 10px 20px 100px; }

        /* Sección Horóscopo */
        .zodiac-card {
            background: linear-gradient(135deg, #fff5f8, var(--zodiac-gold));
            border-radius: 25px;
            padding: 15px;
            margin-bottom: 20px;
            border: 2px solid white;
            text-align: center;
        }

        .zodiac-select {
            width: 100%;
            padding: 10px;
            border-radius: 15px;
            border: 1px solid var(--hot-pink);
            background: white;
            color: var(--hot-pink);
            font-weight: bold;
            margin-bottom: 10px;
        }

        .horoscope-text {
            font-size: 0.85rem;
            color: #7a5c5c;
            font-style: italic;
            min-height: 40px;
        }

        /* Analizador de Ropa (Versión compacta) */
        .vision-card {
            background: #fff;
            border: 2px dashed var(--hot-pink);
            border-radius: 20px;
            padding: 15px;
            text-align: center;
            margin-bottom: 20px;
        }

        #preview-img { width: 100%; max-height: 150px; object-fit: cover; border-radius: 15px; display: none; margin-top: 10px; }

        .rec-card { padding: 12px; border-radius: 15px; margin-bottom: 8px; font-size: 0.8rem; border: 1px solid white; }
        .music-box { background: var(--accent-blue); color: #2c5282; }

        .card { background: var(--pastel-bg); border-radius: 25px; padding: 15px; border: 2px solid white; }
        .mood-row { display: flex; justify-content: space-between; margin: 10px 0; }
        .mood-btn { font-size: 1.4rem; background: white; border: none; border-radius: 15px; width: 50px; height: 50px; cursor: pointer; }
        .mood-btn.active { background: var(--hot-pink); transform: scale(1.1); }
        
        textarea { width: 100%; height: 80px; border: none; border-radius: 15px; padding: 12px; font-size: 0.9rem; outline: none; }
        .save-btn { background: var(--hot-pink); color: white; border: none; width: 100%; padding: 15px; border-radius: 20px; font-weight: bold; margin-top: 10px; }
        
        nav { position: absolute; bottom: 0; width: 100%; height: 75px; background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #eee; padding-bottom: 10px; }
        .nav-item { font-size: 1.4rem; color: #ddd; cursor: pointer; }
        .nav-item.active { color: var(--hot-pink); }
    </style>
</head>
<body>

<div class="app-container">
    <header><h1>GlowDiary ✨</h1></header>

    <div class="content">
        <div class="zodiac-card">
            <p style="margin:0 0 10px; font-weight:bold; color:#d4a373;">✨ Tu Destino Hoy</p>
            <select class="zodiac-select" id="sign-select" onchange="getHoroscope()">
                <option value="">Elige tu signo...</option>
                <option value="Aries">Aries ♈</option>
                <option value="Tauro">Tauro ♉</option>
                <option value="Géminis">Géminis ♊</option>
                <option value="Cáncer">Cáncer ♋</option>
                <option value="Leo">Leo ♌</option>
                <option value="Virgo">Virgo ♍</option>
                <option value="Libra">Libra ♎</option>
                <option value="Escorpio">Escorpio ♏</option>
                <option value="Sagitario">Sagitario ♐</option>
                <option value="Capricornio">Capricornio ♑</option>
                <option value="Acuario">Acuario ♒</option>
                <option value="Piscis">Piscis ♓</option>
            </select>
            <div id="horoscope-result" class="horoscope-text">Las estrellas tienen un mensaje para ti...</div>
        </div>

        <div class="vision-card">
            <p style="margin:0; font-size:0.8rem; font-weight:bold; color:var(--hot-pink);">👗 Outfit Check</p>
            <input type="file" id="clothing-upload" accept="image/*" style="display:none" onchange="analyzeOutfit(event)">
            <button onclick="document.getElementById('clothing-upload').click()" style="background:var(--soft-pink); border:none; padding:8px 15px; border-radius:10px; margin-top:5px; color:var(--hot-pink); font-size:0.7rem; font-weight:bold;">Subir Foto</button>
            <img id="preview-img">
            <div id="verdict" style="font-size:0.75rem; margin-top:5px; font-weight:bold;"></div>
        </div>

        <div id="write-view">
            <div id="rec-area" style="display:none">
                <div class="rec-card music-box"><span id="song-name"></span></div>
            </div>

            <div class="card">
                <div class="mood-row">
                    <button class="mood-btn" onclick="setVibe(5, '🤩', this)">🤩</button>
                    <button class="mood-btn" onclick="setVibe(4, '😊', this)">😊</button>
                    <button class="mood-btn" onclick="setVibe(3, '😐', this)">😐</button>
                    <button class="mood-btn" onclick="setVibe(2, '😔', this)">😔</button>
                    <button class="mood-btn" onclick="setVibe(1, '😢', this)">😢</button>
                </div>
                <textarea id="note" placeholder="¿Cómo te sientes hoy?"></textarea>
                <button class="save-btn" onclick="save()">Guardar ❤️</button>
            </div>
        </div>

        <div id="history-view" style="display:none">
            <div id="history-list"></div>
        </div>
    </div>

    <nav>
        <div class="nav-item active" onclick="tab('write', this)">🏠</div>
        <div class="nav-item" onclick="tab('history', this)">📖</div>
    </nav>
</div>

<script>
    const predictions = [
        "Un amor del pasado podría enviarte un mensaje. Mantén tu brillo. ✨",
        "Hoy es un día ideal para consentirte con un café rosa. La suerte está de tu lado. ☕",
        "Tu energía está por las nubes. ¡Es el momento de brillar en ese proyecto! 🌟",
        "Escucha a tu intuición hoy, alguien cercano necesita tu consejo coquette. 🎀",
        "Vienen noticias positivas sobre dinero o un regalo inesperado. 💸",
        "Hoy el universo dice: 'Ponte tu outfit favorito y sal a conquistar'. 👗"
    ];

    function getHoroscope() {
        const sign = document.getElementById('sign-select').value;
        const result = document.getElementById('horoscope-result');
        if (sign) {
            result.innerText = "Buscando en las estrellas...";
            setTimeout(() => {
                const randomPred = predictions[Math.floor(Math.random() * predictions.length)];
                result.innerText = `${sign}: ${randomPred}`;
            }, 800);
        }
    }

    // Funciones anteriores optimizadas
    function analyzeOutfit(event) {
        const preview = document.getElementById('preview-img');
        const verdict = document.getElementById('verdict');
        preview.src = URL.createObjectURL(event.target.files[0]);
        preview.style.display = 'block';
        verdict.innerText = "✨ ¡Te ves divina! Esa combinación es muy top.";
        verdict.style.color = "#ff85a1";
    }

    const vibes = { 5: "Cruel Summer - Taylor Swift 💖", 4: "Sunflower - Harry Styles 🌻", 3: "Flowers - Miley Cyrus 💐", 2: "Diet Mountain Dew - Lana 🎀", 1: "Lovely - Billie Eilish ☁️" };
    let selected = null;
    let db = JSON.parse(localStorage.getItem('glow_zodiac_db')) || [];

    function setVibe(v, e, btn) {
        selected = { v, e };
        document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('song-name').innerText = "🎵 " + vibes[v];
        document.getElementById('rec-area').style.display = 'block';
    }

    function save() {
        const text = document.getElementById('note').value;
        if(!selected || !text) return alert("¡Dime cómo estás! ✨");
        db.unshift({ mood: selected.e, note: text, date: new Date().toLocaleDateString() });
        localStorage.setItem('glow_zodiac_db', JSON.stringify(db));
        location.reload();
    }

    function tab(v, btn) {
        document.getElementById('write-view').style.display = v === 'write' ? 'block' : 'none';
        document.getElementById('history-view').style.display = v === 'history' ? 'block' : 'none';
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        btn.classList.add('active');
        if(v === 'history') {
            document.getElementById('history-list').innerHTML = db.map(i => `
                <div style="background:#fff3f8; padding:15px; border-radius:20px; margin-bottom:10px; border:1px solid #eee">
                    <small>${i.date} ${i.mood}</small><p style="margin:5px 0">${i.note}</p>
                </div>
            `).join('');
        }
    }
</script>
</body>
</html>
