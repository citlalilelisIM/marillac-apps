
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ratiposa Tamagotchi Study</title>
    <style>
        :root {
            --lila-principal: #e6e6fa;
            --lila-oscuro: #9370db;
            --texto: #4b0082;
            --blanco-transparente: rgba(255, 255, 255, 0.8);
        }

        body {
            background-color: #dcd0ff; /* Fondo Lila */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: var(--texto);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }

        .contenedor {
            background: var(--blanco-transparente);
            backdrop-filter: blur(10px);
            width: 100%;
            max-width: 500px;
            border-radius: 30px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border: 2px solid white;
        }

        /* --- BARRAS TAMAGOTCHI --- */
        .status-container { margin-bottom: 20px; }
        .bar-label { font-size: 12px; font-weight: bold; margin-bottom: 3px; display: block; }
        .bar-bg { background: #eee; height: 10px; border-radius: 5px; margin-bottom: 10px; overflow: hidden; border: 1px solid #ddd; }
        .bar-fill { height: 100%; width: 100%; transition: 0.5s; }
        #hambre-f { background: #ffb7b2; }
        #animo-f { background: #fff9ae; }
        #energia-f { background: #b2e2f2; }

        /* --- LA RATIPOSA --- */
        .pet-stage {
            height: 180px;
            background: white;
            border-radius: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            margin-bottom: 20px;
            border: 2px solid var(--lila-principal);
        }

        .rat-body {
            width: 70px; height: 45px; background: white;
            border-radius: 40px 50px 30px 30px; position: relative;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05); z-index: 2;
            border: 1px solid #eee; transition: 0.3s;
        }

        .ala {
            position: absolute; width: 50px; height: 50px; border-radius: 50% 50% 10% 50%;
            top: -25px; opacity: 0.7; animation: aleteo 1s infinite alternate;
        }
        .ala-izq { left: -30px; background: #add8e6; transform-origin: right bottom; }
        .ala-der { right: -30px; background: #ffb6c1; transform-origin: left bottom; transform: scaleX(-1); }

        @keyframes aleteo { from { transform: rotate(0deg); } to { transform: rotate(-30deg); } }

        .ojo { position: absolute; left: 45px; top: 15px; width: 4px; height: 4px; background: #333; border-radius: 50%; box-shadow: 12px 0 #333; }

        /* --- BOTONES --- */
        .btn {
            width: 100%; padding: 12px; border: none; border-radius: 15px;
            font-weight: bold; cursor: pointer; margin-bottom: 10px; transition: 0.2s;
        }
        .btn-lila { background: var(--lila-oscuro); color: white; }
        .btn-foto { background: #7fcdbb; color: white; }
        .btn:active { transform: scale(0.98); }

        input[type="text"] {
            width: 100%; padding: 10px; margin-bottom: 10px;
            border: 1px solid #ccc; border-radius: 10px; box-sizing: border-box;
        }

        .hidden { display: none; }
        .opciones { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .opt-btn { background: white; padding: 15px; border-radius: 12px; border: 2px solid var(--lila-principal); cursor: pointer; text-align: center; }
        
        .score { text-align: center; font-size: 24px; font-weight: bold; margin-bottom: 10px; color: var(--lila-oscuro); }
    </style>
</head>
<body>

<div class="contenedor">
    <div class="score">PUNTOS: <span id="ptos">0</span></div>

    <div class="status-container">
        <span class="bar-label">HAMBRE 🧀</span>
        <div class="bar-bg"><div id="hambre-f" class="bar-fill"></div></div>
        <span class="bar-label">ÁNIMO 🦋</span>
        <div class="bar-bg"><div id="animo-f" class="bar-fill"></div></div>
        <span class="bar-label">SUEÑO 🌙</span>
        <div class="bar-bg"><div id="energia-f" class="bar-fill"></div></div>
    </div>

    <div class="pet-stage" id="escenario">
        <div class="rat-body" id="rat">
            <div class="ala ala-izq"></div>
            <div class="ala ala-der"></div>
            <div class="ojo"></div>
        </div>
    </div>

    <div id="setup">
        <input type="file" id="foto" accept="image/*" capture="environment" class="hidden">
        <button class="btn btn-foto" onclick="document.getElementById('foto').click()">📸 TOMAR FOTO APUNTE</button>
        <input type="text" id="pregunta" placeholder="Pregunta del apunte...">
        <input type="text" id="respuesta" placeholder="Respuesta correcta...">
        <button class="btn btn-lila" onclick="guardar()">＋ GUARDAR TARJETA</button>
        <button class="btn" style="background:#6a5acd; color:white;" onclick="empezar()">📖 EMPEZAR QUIZ</button>
        <button class="btn" style="background:#999; color:white;" onclick="dormir()">🌙 DORMIR / DESPERTAR</button>
        <p style="text-align:center; font-size:12px">Tarjetas: <span id="cant">0</span></p>
    </div>

    <div id="juego" class="hidden">
        <div id="q-text" style="background:white; padding:20px; border-radius:15px; text-align:center; margin-bottom:15px; border:1px solid #ddd;"></div>
        <div class="opciones" id="opts"></div>
        <button class="btn" style="margin-top:20px;" onclick="volver()">VOLVER</button>
    </div>
</div>

<script>
    let tarjetas = [];
    let puntos = 0;
    let idx = 0;
    let stats = { h: 80, a: 70, s: 100 };
    let esDurmiendo = false;

    function actualizarBarras() {
        document.getElementById('hambre-f').style.width = stats.h + "%";
        document.getElementById('animo-f').style.width = stats.a + "%";
        document.getElementById('energia-f').style.width = stats.s + "%";
        document.getElementById('ptos').innerText = puntos;
    }

    setInterval(() => {
        if(!esDurmiendo) {
            stats.h = Math.max(0, stats.h - 1);
            stats.a = Math.max(0, stats.a - 0.5);
            stats.s = Math.max(0, stats.s - 0.5);
        } else {
            stats.s = Math.min(100, stats.s + 5);
        }
        actualizarBarras();
    }, 5000);

    function guardar() {
        let q = document.getElementById('pregunta').value;
        let r = document.getElementById('respuesta').value;
        if(q && r) {
            tarjetas.push({q, r});
            document.getElementById('cant').innerText = tarjetas.length;
            document.getElementById('pregunta').value = "";
            document.getElementById('respuesta').value = "";
        }
    }

    function dormir() {
        esDurmiendo = !esDurmiendo;
        document.getElementById('escenario').style.filter = esDurmiendo ? "brightness(0.5)" : "none";
    }

    function empezar() {
        if(tarjetas.length < 2) return alert("Añade al menos 2 tarjetas.");
        document.getElementById('setup').classList.add('hidden');
        document.getElementById('juego').classList.remove('hidden');
        mostrarQ();
    }

    function mostrarQ() {
        let t = tarjetas[idx];
        document.getElementById('q-text').innerText = t.q;
        let o = [t.r];
        let otros = tarjetas.filter(x => x.r !== t.r).sort(() => 0.5 - Math.random());
        for(let i=0; i<Math.min(3, otros.length); i++) o.push(otros[i].r);
        o.sort(() => 0.5 - Math.random());

        let div = document.getElementById('opts');
        div.innerHTML = "";
        o.forEach(opt => {
            let b = document.createElement('div');
            b.className = "opt-btn";
            b.innerText = opt;
            b.onclick = () => revisar(opt, t.r);
            div.appendChild(b);
        });
    }

    function revisar(sel, cor) {
        let r = document.getElementById('rat');
        if(sel === cor) {
            puntos += 50;
            stats.h = Math.min(100, stats.h + 20);
            stats.a = Math.min(100, stats.a + 10);
            r.style.transform = "scale(1.3) translateY(-20px)";
            setTimeout(() => r.style.transform = "scale(1)", 500);
            idx = (idx + 1) % tarjetas.length;
            setTimeout(mostrarQ, 600);
        } else {
            stats.a = Math.max(0, stats.a - 15);
            r.style.transform = "translateX(20px)";
            setTimeout(() => r.style.transform = "translateX(0)", 200);
        }
        actualizarBarras();
    }

    function volver() {
        document.getElementById('juego').classList.add('hidden');
        document.getElementById('setup').classList.remove('hidden');
    }

    actualizarBarras();
</script>
</body>
</html>
