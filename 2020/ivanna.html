<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unicornio Cupcake Adventure 🦄🧁</title>
    <style>
        :root {
            --pink: #ffadea;
            --mint: #b2f5ea;
            --candy: #fed7e2;
            --purple: #d6bcfa;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(180deg, #fff5f7 0%, #fed7e2 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            color: #4a4a4a;
        }

        .game-container {
            background: white;
            padding: 20px;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(213, 63, 140, 0.2);
            border: 4px solid var(--pink);
            text-align: center;
            position: relative;
            max-width: 600px;
            width: 90%;
        }

        h1 {
            margin: 0 0 10px 0;
            color: #d53f8c;
            font-size: 1.8rem;
            text-shadow: 1px 1px white;
        }

        .score-board {
            font-size: 24px;
            font-weight: bold;
            color: #b83280;
            margin-bottom: 15px;
            background: var(--candy);
            padding: 5px 20px;
            border-radius: 20px;
            display: inline-block;
        }

        #game-canvas {
            background: linear-gradient(to bottom, #ebf8ff 0%, #fff 100%);
            border-radius: 20px;
            border: 2px solid var(--purple);
            cursor: none; /* Ocultamos el mouse para que solo se vea el unicornio */
            width: 100%;
            display: block;
        }

        .controls {
            margin-top: 15px;
        }

        .btn {
            background: #d53f8c;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
            box-shadow: 0 4px 0 #97266d;
        }

        .btn:hover {
            background: #f687b3;
            transform: translateY(-2px);
        }

        .btn:active {
            transform: translateY(2px);
            box-shadow: none;
        }

        .instructions {
            font-size: 14px;
            color: #718096;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="game-container">
        <h1>Unicornio Comelón 🦄🧁</h1>
        
        <div class="score-board">
            Pastelitos: <span id="score">0</span>
        </div>

        <canvas id="game-canvas" width="500" height="400"></canvas>

        <div class="controls">
            <button class="btn" id="start-btn" onclick="startGame()">¡EMPEZAR A COMER!</button>
        </div>
        
        <p class="instructions">Mueve el mouse (o tu dedo) para atrapar los postres</p>
    </div>

<script>
    const canvas = document.getElementById('game-canvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const startBtn = document.getElementById('start-btn');

    let score = 0;
    let gameRunning = false;
    let items = [];
    let mouseX = canvas.width / 2;
    
    // Lista de postres que caen
    const treats = ["🧁", "🍰", "🍩", "🍪", "🍭"];

    // Control del movimiento
    const updatePosition = (e) => {
        const rect = canvas.getBoundingClientRect();
        let clientX;
        if (e.touches) {
            clientX = e.touches[0].clientX;
        } else {
            clientX = e.clientX;
        }
        mouseX = clientX - rect.left;
        
        // Mantener al unicornio dentro de los bordes
        if (mouseX < 25) mouseX = 25;
        if (mouseX > canvas.width - 25) mouseX = canvas.width - 25;
    };

    canvas.addEventListener('mousemove', updatePosition);
    canvas.addEventListener('touchmove', (e) => {
        updatePosition(e);
        e.preventDefault();
    }, { passive: false });

    function startGame() {
        if (gameRunning) return;
        
        score = 0;
        items = [];
        gameRunning = true;
        scoreEl.innerText = score;
        startBtn.style.visibility = 'hidden';
        
        gameLoop();
    }

    function createItem() {
        // Aparecen pastelitos poco a poco
        if (Math.random() < 0.03) {
            items.push({
                x: Math.random() * (canvas.width - 40) + 20,
                y: -30,
                emoji: treats[Math.floor(Math.random() * treats.length)],
                speed: 1.5 + Math.random() * 1.5 // Velocidad suave
            });
        }
    }

    function gameLoop() {
        if (!gameRunning) return;

        // Limpiar lienzo
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Dibujar Unicornio (Jugador)
        ctx.font = "50px Arial";
        ctx.textAlign = "center";
        ctx.fillText("🦄", mouseX, canvas.height - 30);

        createItem();

        for (let i = items.length - 1; i >= 0; i--) {
            let it = items[i];
            it.y += it.speed;

            // Dibujar el pastelito
            ctx.font = "30px Arial";
            ctx.fillText(it.emoji, it.x, it.y);

            // Verificar si el unicornio lo "come" (Colisión)
            // Si el pastelito está cerca de la boca/cabeza del unicornio
            if (it.y > canvas.height - 80 && it.y < canvas.height - 20 && Math.abs(it.x - mouseX) < 40) {
                items.splice(i, 1);
                score++;
                scoreEl.innerText = score;
                continue;
            }

            // Si el pastelito toca el suelo, se pierde
            if (it.y > canvas.height) {
                gameRunning = false;
                alert("¡Oh no! Se cayó un dulce. Puntuación final: " + score);
                startBtn.style.visibility = 'visible';
                startBtn.innerText = "REINTENTAR";
            }
        }

        requestAnimationFrame(gameLoop);
    }
</script>

</body>
</html>
