<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tetris Pastel Moderno</title>
    <style>
        :root {
            --bg-color: #fdf6f0;
            --panel-color: #ffffff;
            --text-color: #889eaf;
            /* Colores Pastel para las piezas */
            --color-I: #ffb7b2; --color-J: #ffdac1;
            --color-L: #e2f0cb; --color-O: #b5ead7;
            --color-S: #c7ceea; --color-T: #ff9aa2;
            --color-Z: #d4a5a5;
        }

        body {
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: var(--text-color);
        }

        .game-container {
            display: flex;
            gap: 20px;
            background: var(--panel-color);
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        canvas {
            border: 4px solid #f0f0f0;
            border-radius: 10px;
            background-color: #fafafa;
        }

        .side-panel {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-width: 150px;
        }

        .stat-box {
            background: #f9f9f9;
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            margin-bottom: 10px;
        }

        .stat-label { font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; }
        .stat-value { font-size: 1.8rem; font-weight: bold; color: #6d8299; }

        .instructions {
            font-size: 0.8rem;
            line-height: 1.5;
            color: #b0bfc6;
        }

        #overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 20px;
            z-index: 10;
        }
    </style>
</head>
<body>

    <h1 style="margin-bottom: 10px;">Tetris Pastel</h1>

    <div class="game-container" style="position: relative;">
        <div id="overlay">
            <h2 id="msg">¡Presiona ENTER!</h2>
            <p>Usa las flechas para mover y rotar</p>
        </div>

        <canvas id="tetris" width="240" height="400"></canvas>

        <div class="side-panel">
            <div>
                <div class="stat-box">
                    <div class="stat-label">Puntos</div>
                    <div id="score" class="stat-value">0</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Líneas</div>
                    <div id="lines" class="stat-value">0</div>
                </div>
            </div>
            
            <div class="instructions">
                <b>Controles:</b><br>
                ← → : Mover<br>
                ↑ : Rotar<br>
                ↓ : Bajar rápido<br>
                <b>ENTER</b> : Iniciar/Reiniciar
            </div>
        </div>
    </div>

<script>
    const canvas = document.getElementById('tetris');
    const context = canvas.getContext('2d');
    const scoreElement = document.getElementById('score');
    const linesElement = document.getElementById('lines');
    const overlay = document.getElementById('overlay');

    context.scale(20, 20);

    // Definición de piezas y sus colores pastel
    const colors = [
        null,
        '#ffb7b2', // I
        '#ffdac1', // J
        '#e2f0cb', // L
        '#b5ead7', // O
        '#c7ceea', // S
        '#ff9aa2', // T
        '#d4a5a5', // Z
    ];

    function createPiece(type) {
        if (type === 'I') return [[0, 1, 0, 0], [0, 1, 0, 0], [0, 1, 0, 0], [0, 1, 0, 0]];
        else if (type === 'L') return [[0, 3, 0], [0, 3, 0], [0, 3, 3]];
        else if (type === 'J') return [[0, 2, 0], [0, 2, 0], [2, 2, 0]];
        else if (type === 'O') return [[4, 4], [4, 4]];
        else if (type === 'Z') return [[7, 7, 0], [0, 7, 7], [0, 0, 0]];
        else if (type === 'S') return [[0, 5, 5], [5, 5, 0], [0, 0, 0]];
        else if (type === 'T') return [[0, 6, 0], [6, 6, 6], [0, 0, 0]];
    }

    function createMatrix(w, h) {
        const matrix = [];
        while (h--) matrix.push(new Array(w).fill(0));
        return matrix;
    }

    function draw() {
        context.fillStyle = '#fafafa';
        context.fillRect(0, 0, canvas.width, canvas.height);

        drawMatrix(arena, {x: 0, y: 0});
        drawMatrix(player.matrix, player.pos);
    }

    function drawMatrix(matrix, offset) {
        matrix.forEach((row, y) => {
            row.forEach((value, x) => {
                if (value !== 0) {
                    context.fillStyle = colors[value];
                    context.fillRect(x + offset.x, y + offset.y, 1, 1);
                    // Efecto de borde suave
                    context.lineWidth = 0.05;
                    context.strokeStyle = 'white';
                    context.strokeRect(x + offset.x, y + offset.y, 1, 1);
                }
            });
        });
    }

    function merge(arena, player) {
        player.matrix.forEach((row, y) => {
            row.forEach((value, x) => {
                if (value !== 0) {
                    arena[y + player.pos.y][x + player.pos.x] = value;
                }
            });
        });
    }

    function rotate(matrix, dir) {
        for (let y = 0; y < matrix.length; ++y) {
            for (let x = 0; x < y; ++x) {
                [matrix[x][y], matrix[y][x]] = [matrix[y][x], matrix[x][y]];
            }
        }
        if (dir > 0) matrix.forEach(row => row.reverse());
        else matrix.reverse();
    }

    function collide(arena, player) {
        const [m, o] = [player.matrix, player.pos];
        for (let y = 0; y < m.length; ++y) {
            for (let x = 0; x < m[y].length; ++x) {
                if (m[y][x] !== 0 && (arena[y + o.y] && arena[y + o.y][x + o.x]) !== 0) {
                    return true;
                }
            }
        }
        return false;
    }

    function arenaSweep() {
        let rowCount = 1;
        outer: for (let y = arena.length - 1; y > 0; --y) {
            for (let x = 0; x < arena[y].length; ++x) {
                if (arena[y][x] === 0) continue outer;
            }
            const row = arena.splice(y, 1)[0].fill(0);
            arena.unshift(row);
            ++y;
            player.score += rowCount * 10;
            player.lines += 1;
            rowCount *= 2;
        }
        updateScore();
    }

    function playerDrop() {
        player.pos.y++;
        if (collide(arena, player)) {
            player.pos.y--;
            merge(arena, player);
            playerReset();
            arenaSweep();
        }
        dropCounter = 0;
    }

    function playerMove(dir) {
        player.pos.x += dir;
        if (collide(arena, player)) {
            player.pos.x -= dir;
        }
    }

    function playerReset() {
        const pieces = 'ILJOTSZ';
        player.matrix = createPiece(pieces[pieces.length * Math.random() | 0]);
        player.pos.y = 0;
        player.pos.x = (arena[0].length / 2 | 0) - (player.matrix[0].length / 2 | 0);
        if (collide(arena, player)) {
            arena.forEach(row => row.fill(0));
            player.score = 0;
            player.lines = 0;
            updateScore();
            isPaused = true;
            overlay.style.display = 'flex';
            document.getElementById('msg').innerText = "FIN DEL JUEGO";
        }
    }

    function playerRotate(dir) {
        const pos = player.pos.x;
        let offset = 1;
        rotate(player.matrix, dir);
        while (collide(arena, player)) {
            player.pos.x += offset;
            offset = -(offset + (offset > 0 ? 1 : -1));
            if (offset > player.matrix[0].length) {
                rotate(player.matrix, -dir);
                player.pos.x = pos;
                return;
            }
        }
    }

    function updateScore() {
        scoreElement.innerText = player.score;
        linesElement.innerText = player.lines;
    }

    let dropCounter = 0;
    let dropInterval = 1000;
    let lastTime = 0;
    let isPaused = true;

    function update(time = 0) {
        if(isPaused) return;

        const deltaTime = time - lastTime;
        lastTime = time;

        dropCounter += deltaTime;
        if (dropCounter > dropInterval) {
            playerDrop();
        }

        draw();
        requestAnimationFrame(update);
    }

    const arena = createMatrix(12, 20);

    const player = {
        pos: {x: 0, y: 0},
        matrix: null,
        score: 0,
        lines: 0,
    };

    document.addEventListener('keydown', event => {
        if (event.keyCode === 37) { // Izquierda
            playerMove(-1);
        } else if (event.keyCode === 39) { // Derecha
            playerMove(1);
        } else if (event.keyCode === 40) { // Abajo
            playerDrop();
        } else if (event.keyCode === 38) { // Arriba (Rotar)
            playerRotate(1);
        } else if (event.keyCode === 13) { // ENTER
            if (isPaused) {
                isPaused = false;
                overlay.style.display = 'none';
                if (!player.matrix) playerReset();
                update();
            }
        }
    });

    draw(); // Dibujo inicial
</script>
</body>
</html>
