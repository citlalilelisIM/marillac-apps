<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Character Battle</title>
    <style>
        body {
            margin: 0;
            background-color: #2c3e50;
            color: #00d4ff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        #contenedor-juego {
            position: relative;
            box-shadow: 0 0 50px rgba(0, 212, 255, 0.4);
        }

        canvas {
            background-color: #1a1a1a;
            border: 4px solid #00d4ff;
            display: block;
        }

        .interfaz {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(10, 10, 15, 0.95);
            z-index: 10;
        }

        .seleccion-personajes {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }

        .tarjeta-pj {
            border: 2px solid #00d4ff;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            width: 160px;
            background: #222;
        }

        .tarjeta-pj:hover {
            background: #00d4ff;
            color: #000;
            transform: translateY(-5px);
        }

        .oculto { display: none !important; }
        
        #stats {
            position: absolute;
            top: 15px;
            left: 15px;
            pointer-events: none;
            font-size: 22px;
            font-weight: bold;
            text-shadow: 2px 2px #000;
        }

        button {
            background: transparent;
            color: #00d4ff;
            border: 2px solid #00d4ff;
            padding: 12px 24px;
            font-family: inherit;
            font-size: 1.2rem;
            cursor: pointer;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div id="contenedor-juego">
        <div id="stats">PUNTOS: <span id="puntos">0</span> | VIDAS: <span id="vidas">3</span></div>
        
        <div id="pantalla-seleccion" class="interfaz">
            <h1>ELIGE TU GUERRERO</h1>
            <div class="seleccion-personajes">
                <div class="tarjeta-pj" onclick="iniciar('VELOCIDAD')">
                    <h3 style="color: #ff00ff;">AGENTE ROSA</h3>
                    <p>Balas Láser (Ultra Rápidas)</p>
                </div>
                <div class="tarjeta-pj" onclick="iniciar('EXPANSION')">
                    <h3 style="color: #00ff00;">TITÁN VERDE</h3>
                    <p>Plasma Pesado (Gran Impacto)</p>
                </div>
                <div class="tarjeta-pj" onclick="iniciar('RAFAGA')">
                    <h3 style="color: #ffff00;">COMBO ORO</h3>
                    <p>Multidisparo (Cobertura Total)</p>
                </div>
            </div>
        </div>

        <div id="pantalla-muerte" class="interfaz oculto">
            <h1 style="color: #ff3333;">SISTEMA CAÍDO</h1>
            <p>PUNTUACIÓN FINAL: <span id="puntos-final">0</span></p>
            <button onclick="location.reload()">REINICIAR</button>
        </div>

        <canvas id="canvas"></canvas>
    </div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = 800;
    canvas.height = 600;

    let juegoCorriendo = false;
    let puntos = 0;
    let vidas = 3;
    let tipoDisparo = '';
    let teclas = {};
    let proyectiles = [];
    let enemigos = [];
    let barreras = [];
    let frame = 0;
    let lastShootTime = 0;

    class Barrera {
        constructor(x, y) {
            this.x = x;
            this.y = y;
            this.w = 90;
            this.h = 15;
            this.vida = 6;
        }
        dibujar() {
            ctx.fillStyle = `rgba(0, 212, 255, ${this.vida / 6})`;
            ctx.shadowBlur = 15;
            ctx.shadowColor = "#00d4ff";
            ctx.fillRect(this.x, this.y, this.w, this.h);
        }
    }

    const jugador = {
        x: 380,
        y: 520,
        w: 40,
        h: 40,
        velocidad: 8,
        color: '#ff00ff',
        dibujar() {
            ctx.shadowBlur = 20;
            ctx.shadowColor = this.color;
            ctx.fillStyle = this.color;
            // Dibujar Nave Personaje
            ctx.fillRect(this.x + 15, this.y, 10, 10); // Punta
            ctx.fillRect(this.x + 5, this.y + 10, 30, 20); // Cuerpo
            ctx.fillStyle = "#fff";
            ctx.fillRect(this.x + 10, this.y + 15, 5, 5); // Ojo L
            ctx.fillRect(this.x + 25, this.y + 15, 5, 5); // Ojo R
        }
    };

    class Bala {
        constructor(x, y, vx, vy, color, r) {
            this.x = x; this.y = y; this.vx = vx; this.vy = vy; this.r = r; this.color = color;
        }
        actualizar() { this.x += this.vx; this.y += this.vy; }
        dibujar() {
            ctx.shadowBlur = 10;
            ctx.shadowColor = this.color;
            ctx.fillStyle = this.color;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    class EnemigoPersonaje {
        constructor(x, y, vel) {
            this.x = x;
            this.y = y;
            this.w = 35;
            this.h = 35;
            this.vel = vel;
            this.color = `hsl(${Math.random() * 360}, 100%, 50%)`;
            this.offset = Math.random() * 100;
        }
        actualizar() {
            this.y += this.vel;
            this.x += Math.sin((frame + this.offset) * 0.05) * 2;
        }
        dibujar() {
            ctx.shadowBlur = 15;
            ctx.shadowColor = this.color;
            ctx.fillStyle = this.color;
            // Dibujar pequeño monstruo pixelado
            ctx.fillRect(this.x + 10, this.y, 15, 10); // Cabeza
            ctx.fillRect(this.x, this.y + 10, 35, 15); // Cuerpo
            ctx.fillRect(this.x + 5, this.y + 25, 5, 10); // Pata L
            ctx.fillRect(this.x + 25, this.y + 25, 5, 10); // Pata R
            // Ojos
            ctx.fillStyle = "white";
            let eyeSize = (frame % 20 < 10) ? 6 : 2; // Efecto parpadeo
            ctx.fillRect(this.x + 8, this.y + 12, eyeSize, eyeSize);
            ctx.fillRect(this.x + 22, this.y + 12, eyeSize, eyeSize);
        }
    }

    function disparar() {
        const now = Date.now();
        if (now - lastShootTime < 150) return; // Limitar velocidad de ráfaga
        lastShootTime = now;

        const x = jugador.x + 20;
        const y = jugador.y;
        
        if (tipoDisparo === 'VELOCIDAD') {
            proyectiles.push(new Bala(x, y, 0, -25, '#ff00ff', 4)); // BALA MUY RÁPIDA
        } else if (tipoDisparo === 'EXPANSION') {
            proyectiles.push(new Bala(x, y, 0, -12, '#00ff00', 15)); // BALA GRANDE RÁPIDA
        } else if (tipoDisparo === 'RAFAGA') {
            proyectiles.push(new Bala(x, y, 0, -18, '#ffff00', 5));
            proyectiles.push(new Bala(x, y, -4, -17, '#ffff00', 5));
            proyectiles.push(new Bala(x, y, 4, -17, '#ffff00', 5));
        }
    }

    function dibujarEscenario() {
        ctx.fillStyle = '#333'; 
        ctx.fillRect(0,0, canvas.width, canvas.height);
        ctx.strokeStyle = 'rgba(0, 212, 255, 0.15)';
        for(let i=0; i<canvas.width; i+=50) {
            ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke();
        }
        for(let i=0; i<canvas.height; i+=50) {
            ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(canvas.width, i); ctx.stroke();
        }
    }

    function spawnEnemigos() {
        let spawnRate = Math.max(20, 60 - Math.floor(puntos/100));
        if (frame % spawnRate === 0) {
            enemigos.push(new EnemigoPersonaje(Math.random() * 750, -50, 1.5 + (puntos / 300)));
        }
    }

    function detectarColisiones() {
        proyectiles.forEach((b, bi) => {
            enemigos.forEach((e, ei) => {
                if (b.x > e.x && b.x < e.x + e.w && b.y > e.y && b.y < e.y + e.h) {
                    enemigos.splice(ei, 1);
                    proyectiles.splice(bi, 1);
                    puntos += 15;
                    document.getElementById('puntos').innerText = puntos;
                }
            });
        });

        enemigos.forEach((e, ei) => {
            barreras.forEach((b, bi) => {
                if (e.x < b.x + b.w && e.x + e.w > b.x && e.y < b.y + b.h && e.y + e.h > b.y) {
                    enemigos.splice(ei, 1);
                    b.vida--;
                    if (b.vida <= 0) barreras.splice(bi, 1);
                }
            });

            if (e.y > 600 || (e.x < jugador.x + jugador.w && e.x + e.w > jugador.x && e.y < jugador.y + jugador.h && e.y + e.h > jugador.y)) {
                enemigos.splice(ei, 1);
                vidas--;
                document.getElementById('vidas').innerText = vidas;
                if (vidas <= 0) finDelJuego();
            }
        });
    }

    function loop() {
        if (!juegoCorriendo) return;
        frame++;
        dibujarEscenario();

        if ((teclas['ArrowLeft'] || teclas['KeyA']) && jugador.x > 0) jugador.x -= jugador.velocidad;
        if ((teclas['ArrowRight'] || teclas['KeyD']) && jugador.x < canvas.width - jugador.w) jugador.x += jugador.velocidad;
        if (teclas['Space']) disparar(); // Disparo continuo

        barreras.forEach(b => b.dibujar());
        jugador.dibujar();
        
        proyectiles.forEach((p, i) => {
            p.actualizar();
            p.dibujar();
            if (p.y < -50 || p.x < 0 || p.x > 800) proyectiles.splice(i, 1);
        });

        spawnEnemigos();
        enemigos.forEach(e => { e.actualizar(); e.dibujar(); });

        detectarColisiones();
        requestAnimationFrame(loop);
    }

    function iniciar(tipo) {
        tipoDisparo = tipo;
        if(tipo === 'VELOCIDAD') jugador.color = '#ff00ff';
        if(tipo === 'EXPANSION') jugador.color = '#00ff00';
        if(tipo === 'RAFAGA') jugador.color = '#ffff00';

        barreras = [new Barrera(100, 460), new Barrera(350, 460), new Barrera(600, 460)];
        document.getElementById('pantalla-seleccion').classList.add('oculto');
        juegoCorriendo = true;
        loop();
    }

    function finDelJuego() {
        juegoCorriendo = false;
        document.getElementById('pantalla-muerte').classList.remove('oculto');
        document.getElementById('puntos-final').innerText = puntos;
    }

    window.addEventListener('keydown', e => teclas[e.code] = true);
    window.addEventListener('keyup', e => teclas[e.code] = false);

    dibujarEscenario();
</script>
</body>
</html>
