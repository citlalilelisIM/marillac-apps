<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Invasión Neón - Arcade</title>
    <style>
        body {
            margin: 0;
            background-color: #2d1b4d; /* Fondo Lila Oscuro */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: #00d4ff; /* Azul Neón */
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
        }
        canvas {
            border: 4px solid #00d4ff;
            box-shadow: 0 0 20px #00d4ff;
            background-color: #1a0f2e;
            cursor: none;
        }
        .hud {
            display: flex;
            justify-content: space-between;
            width: 800px;
            margin-bottom: 10px;
            font-size: 24px;
            text-transform: uppercase;
            text-shadow: 0 0 10px #00d4ff;
        }
        #game-over {
            position: absolute;
            display: none;
            flex-direction: column;
            align-items: center;
            background: rgba(45, 27, 77, 0.9);
            padding: 40px;
            border: 3px solid #ff0055;
            box-shadow: 0 0 30px #ff0055;
            text-align: center;
        }
        button {
            background: transparent;
            color: #00d4ff;
            border: 2px solid #00d4ff;
            padding: 10px 20px;
            font-family: inherit;
            font-size: 20px;
            cursor: pointer;
            margin-top: 20px;
            transition: 0.3s;
        }
        button:hover {
            background: #00d4ff;
            color: #1a0f2e;
            box-shadow: 0 0 15px #00d4ff;
        }
    </style>
</head>
<body>

    <div class="hud">
        <span>Puntos: <span id="score">0</span></span>
        <span>Vidas: <span id="lives">3</span></span>
    </div>

    <canvas id="gameCanvas" width="800" height="600"></canvas>

    <div id="game-over">
        <h1 style="color: #ff0055; text-shadow: 0 0 10px #ff0055;">FIN DEL JUEGO</h1>
        <p>Puntaje Final: <span id="final-score">0</span></p>
        <button onclick="resetGame()">REINTENTAR</button>
    </div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const livesEl = document.getElementById('lives');
    const gameOverScreen = document.getElementById('game-over');
    const finalScoreEl = document.getElementById('final-score');

    // Estado del juego
    let score = 0;
    let lives = 3;
    let gameRunning = true;
    let keys = {};

    // Jugador
    const player = {
        x: canvas.width / 2 - 20,
        y: canvas.height - 60,
        w: 40,
        h: 40,
        speed: 7,
        color: '#00d4ff'
    };

    let bullets = [];
    let enemies = [];
    let enemySpeed = 2;
    let spawnRate = 1500; // ms

    // Controles
    window.addEventListener('keydown', e => keys[e.code] = true);
    window.addEventListener('keyup', e => keys[e.code] = false);

    function spawnEnemy() {
        if (!gameRunning) return;
        const size = 30 + Math.random() * 20;
        enemies.push({
            x: Math.random() * (canvas.width - size),
            y: -size,
            w: size,
            h: size,
            speed: enemySpeed + Math.random()
        });
        // Aumentar dificultad gradualmente
        setTimeout(spawnEnemy, Math.max(500, spawnRate - score * 2));
    }

    function resetGame() {
        score = 0;
        lives = 3;
        bullets = [];
        enemies = [];
        enemySpeed = 2;
        gameRunning = true;
        scoreEl.innerText = score;
        livesEl.innerText = lives;
        gameOverScreen.style.display = 'none';
        update();
    }

    function update() {
        if (!gameRunning) return;

        // Movimiento Jugador
        if ((keys['ArrowLeft'] || keys['KeyA']) && player.x > 0) player.x -= player.speed;
        if ((keys['ArrowRight'] || keys['KeyD']) && player.x < canvas.width - player.w) player.x += player.speed;
        
        // Disparo (Espacio)
        if (keys['Space']) {
            if (bullets.length === 0 || bullets[bullets.length-1].y < player.y - 100) {
                bullets.push({ x: player.x + player.w/2 - 2, y: player.y, w: 4, h: 15 });
                keys['Space'] = false; // Semi-automático
            }
        }

        // Actualizar Balas
        bullets.forEach((b, i) => {
            b.y -= 10;
            if (b.y < 0) bullets.splice(i, 1);
        });

        // Actualizar Enemigos
        enemies.forEach((en, i) => {
            en.y += en.speed;
            
            // Colisión con jugador
            if (en.x < player.x + player.w && en.x + en.w > player.x && en.y < player.y + player.h && en.y + en.h > player.y) {
                enemies.splice(i, 1);
                lives--;
                livesEl.innerText = lives;
                if (lives <= 0) endGame();
            }

            // Si escapa
            if (en.y > canvas.height) {
                enemies.splice(i, 1);
            }

            // Colisión con balas
            bullets.forEach((b, bi) => {
                if (b.x < en.x + en.w && b.x + b.w > en.x && b.y < en.y + en.h && b.y + b.h > en.y) {
                    enemies.splice(i, 1);
                    bullets.splice(bi, 1);
                    score += 10;
                    scoreEl.innerText = score;
                }
            });
        });

        draw();
        requestAnimationFrame(update);
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Dibujar Jugador (Nave)
        ctx.fillStyle = player.color;
        ctx.shadowBlur = 15;
        ctx.shadowColor = player.color;
        ctx.beginPath();
        ctx.moveTo(player.x + player.w/2, player.y);
        ctx.lineTo(player.x, player.y + player.h);
        ctx.lineTo(player.x + player.w, player.y + player.h);
        ctx.closePath();
        ctx.fill();

        // Dibujar Balas
        ctx.fillStyle = '#00d4ff';
        bullets.forEach(b => ctx.fillRect(b.x, b.y, b.w, b.h));

        // Dibujar Enemigos
        ctx.fillStyle = '#ff0055'; // Enemigos en contraste neón
        ctx.shadowColor = '#ff0055';
        enemies.forEach(en => {
            ctx.strokeRect(en.x, en.y, en.w, en.h);
            ctx.fillRect(en.x + 5, en.y + 5, en.w - 10, en.h - 10);
        });
        ctx.shadowBlur = 0;
    }

    function endGame() {
        gameRunning = false;
        finalScoreEl.innerText = score;
        gameOverScreen.style.display = 'flex';
    }

    // Iniciar
    spawnEnemy();
    update();
</script>
</body>
</html>
