<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invasión Neón Retro</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            color: #0ff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            text-transform: uppercase;
        }

        canvas {
            border: 2px solid #0ff;
            box-shadow: 0 0 20px #0ff;
            background-color: #050505;
        }

        #ui {
            position: absolute;
            top: 20px;
            display: flex;
            gap: 50px;
            font-size: 24px;
            text-shadow: 0 0 10px #0ff;
            pointer-events: none;
        }

        #game-over {
            position: absolute;
            display: none;
            flex-direction: column;
            align-items: center;
            background: rgba(0, 0, 0, 0.85);
            padding: 40px;
            border: 3px solid #f0f;
            box-shadow: 0 0 30px #f0f;
            z-index: 10;
        }

        h1 { color: #f0f; margin-bottom: 10px; }
        
        button {
            background: transparent;
            color: #0ff;
            border: 2px solid #0ff;
            padding: 10px 20px;
            font-family: inherit;
            font-size: 20px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #0ff;
            color: #000;
            box-shadow: 0 0 15px #0ff;
        }
    </style>
</head>
<body>

    <div id="ui">
        <div>Puntos: <span id="score">0</span></div>
        <div>Vidas: <span id="lives">3</span></div>
    </div>

    <div id="game-over">
        <h1>FIN DEL JUEGO</h1>
        <p>Puntaje Final: <span id="final-score">0</span></p>
        <button onclick="resetGame()">REINICIAR</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const livesEl = document.getElementById('lives');
        const gameOverEl = document.getElementById('game-over');
        const finalScoreEl = document.getElementById('final-score');

        // Configuración
        canvas.width = 800;
        canvas.height = 600;

        let score = 0;
        let lives = 3;
        let gameRunning = true;
        let keys = {};

        // Clases de objetos
        class Player {
            constructor() {
                this.width = 40;
                this.height = 40;
                this.x = canvas.width / 2 - this.width / 2;
                this.y = canvas.height - 60;
                this.speed = 6;
            }

            draw() {
                ctx.strokeStyle = '#0ff';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.moveTo(this.x + this.width / 2, this.y);
                ctx.lineTo(this.x, this.y + this.height);
                ctx.lineTo(this.x + this.width, this.y + this.height);
                ctx.closePath();
                ctx.stroke();
                // Brillo neón
                ctx.shadowBlur = 15;
                ctx.shadowColor = '#0ff';
            }

            update() {
                if ((keys['ArrowLeft'] || keys['a']) && this.x > 0) this.x -= this.speed;
                if ((keys['ArrowRight'] || keys['d']) && this.x < canvas.width - this.width) this.x += this.speed;
                if ((keys['ArrowUp'] || keys['w']) && this.y > 0) this.y -= this.speed;
                if ((keys['ArrowDown'] || keys['s']) && this.y < canvas.height - this.height) this.y += this.speed;
            }
        }

        class Bullet {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.radius = 4;
                this.speed = 8;
            }

            draw() {
                ctx.fillStyle = '#ff0';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 10;
                ctx.shadowColor = '#ff0';
            }

            update() {
                this.y -= this.speed;
            }
        }

        class Enemy {
            constructor(x, y, speed) {
                this.x = x;
                this.y = y;
                this.width = 35;
                this.height = 35;
                this.speed = speed;
            }

            draw() {
                ctx.strokeStyle = '#f0f';
                ctx.strokeRect(this.x, this.y, this.width, this.height);
                ctx.shadowBlur = 15;
                ctx.shadowColor = '#f0f';
            }

            update() {
                this.y += this.speed;
            }
        }

        let player = new Player();
        let bullets = [];
        let enemies = [];
        let enemyTimer = 0;

        // Controles
        window.addEventListener('keydown', (e) => {
            keys[e.key] = true;
            if (e.key === ' ' && gameRunning) {
                bullets.push(new Bullet(player.x + player.width / 2, player.y));
            }
        });
        window.addEventListener('keyup', (e) => keys[e.key] = false);

        function spawnEnemies() {
            enemyTimer++;
            // Dificultad progresiva
            let spawnRate = Math.max(20, 60 - Math.floor(score / 500));
            if (enemyTimer > spawnRate) {
                let x = Math.random() * (canvas.width - 40);
                let speed = 2 + Math.random() * 2 + (score / 2000);
                enemies.push(new Enemy(x, -50, speed));
                enemyTimer = 0;
            }
        }

        function checkCollisions() {
            enemies.forEach((enemy, eIdx) => {
                // Colisión con Jugador
                if (
                    player.x < enemy.x + enemy.width &&
                    player.x + player.width > enemy.x &&
                    player.y < enemy.y + enemy.height &&
                    player.y + player.height > enemy.y
                ) {
                    enemies.splice(eIdx, 1);
                    lives--;
                    livesEl.innerText = lives;
                    if (lives <= 0) endGame();
                }

                // Colisión con Balas
                bullets.forEach((bullet, bIdx) => {
                    if (
                        bullet.x > enemy.x &&
                        bullet.x < enemy.x + enemy.width &&
                        bullet.y > enemy.y &&
                        bullet.y < enemy.y + enemy.height
                    ) {
                        enemies.splice(eIdx, 1);
                        bullets.splice(bIdx, 1);
                        score += 100;
                        scoreEl.innerText = score;
                    }
                });

                // Enemigo sale de pantalla
                if (enemy.y > canvas.height) {
                    enemies.splice(eIdx, 1);
                }
            });

            bullets.forEach((bullet, bIdx) => {
                if (bullet.y < 0) bullets.splice(bIdx, 1);
            });
        }

        function endGame() {
            gameRunning = false;
            gameOverEl.style.display = 'flex';
            finalScoreEl.innerText = score;
        }

        function resetGame() {
            score = 0;
            lives = 3;
            bullets = [];
            enemies = [];
            player = new Player();
            scoreEl.innerText = score;
            livesEl.innerText = lives;
            gameRunning = true;
            gameOverEl.style.display = 'none';
            animate();
        }

        function animate() {
            if (!gameRunning) return;

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            player.update();
            player.draw();

            spawnEnemies();

            bullets.forEach(b => {
                b.update();
                b.draw();
            });

            enemies.forEach(e => {
                e.update();
                e.draw();
            });

            checkCollisions();

            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
