<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcade Neón - Nave Rosa</title>
    <style>
        body {
            margin: 0;
            background-color: #050505;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        canvas {
            border: 3px solid #333;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
            background: #000;
            cursor: crosshair;
        }

        .ui {
            position: absolute;
            top: 20px;
            display: flex;
            gap: 40px;
            font-size: 20px;
            text-shadow: 0 0 10px #fff;
        }

        #gameOver {
            position: absolute;
            display: none;
            flex-direction: column;
            align-items: center;
            background: rgba(0, 0, 0, 0.9);
            padding: 40px;
            border: 2px solid #ff00ff;
            box-shadow: 0 0 30px #ff00ff;
            text-align: center;
        }

        h1 { color: #ff00ff; text-shadow: 0 0 15px #ff00ff; margin-top: 0; }

        button {
            background: transparent;
            color: #00ffff;
            border: 2px solid #00ffff;
            padding: 10px 25px;
            font-family: inherit;
            font-size: 18px;
            cursor: pointer;
            margin-top: 20px;
            transition: 0.3s;
        }

        button:hover {
            background: #00ffff;
            color: #000;
            box-shadow: 0 0 20px #00ffff;
        }
    </style>
</head>
<body>

    <div class="ui">
        <div>PUNTOS: <span id="score">0</span></div>
        <div>VIDAS: <span id="lives">3</span></div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div id="gameOver">
        <h1>¡FIN DEL JUEGO!</h1>
        <p>Tu puntuación final: <span id="finalScore">0</span></p>
        <button onclick="resetGame()">REINICIAR</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const livesEl = document.getElementById('lives');
        const gameOverEl = document.getElementById('gameOver');
        const finalScoreEl = document.getElementById('finalScore');

        canvas.width = 800;
        canvas.height = 600;

        // Configuración del juego
        let score = 0;
        let lives = 3;
        let gameActive = true;
        let enemies = [];
        let bullets = [];
        let keys = {};

        // La Nave Rosa
        const player = {
            x: canvas.width / 2,
            y: canvas.height - 50,
            width: 30,
            height: 30,
            speed: 7,
            color: '#ff00ff' // Rosa Neón
        };

        // Controles
        window.addEventListener('keydown', e => keys[e.code] = true);
        window.addEventListener('keyup', e => keys[e.code] = false);

        function spawnEnemy() {
            if (!gameActive) return;
            const size = 30;
            const x = Math.random() * (canvas.width - size);
            const colors = ['#00ffff', '#ffff00', '#00ff00', '#ff4500'];
            enemies.push({
                x: x,
                y: -size,
                width: size,
                height: size,
                speed: 2 + Math.random() * 2,
                color: colors[Math.floor(Math.random() * colors.length)]
            });
            setTimeout(spawnEnemy, 1000 - Math.min(score, 800)); // Dificultad progresiva
        }

        function resetGame() {
            score = 0;
            lives = 3;
            enemies = [];
            bullets = [];
            gameActive = true;
            player.x = canvas.width / 2;
            scoreEl.innerText = score;
            livesEl.innerText = lives;
            gameOverEl.style.display = 'none';
            animate();
        }

        function update() {
            if (!gameActive) return;

            // Movimiento jugador
            if ((keys['ArrowLeft'] || keys['KeyA']) && player.x > 0) player.x -= player.speed;
            if ((keys['ArrowRight'] || keys['KeyD']) && player.x < canvas.width - player.width) player.x += player.speed;
            
            // Disparo (Space)
            if (keys['Space']) {
                if (bullets.length === 0 || bullets[bullets.length - 1].y < player.y - 100) {
                    bullets.push({ x: player.x + player.width/2 - 2, y: player.y, w: 4, h: 15 });
                    keys['Space'] = false; // Evita ráfaga infinita pegada
                }
            }

            // Actualizar Balas
            bullets.forEach((b, i) => {
                b.y -= 10;
                if (b.y < 0) bullets.splice(i, 1);
            });

            // Actualizar Enemigos
            enemies.forEach((en, i) => {
                en.y += en.speed;

                // Colisión con jugador
                if (en.x < player.x + player.width && en.x + en.width > player.x &&
                    en.y < player.y + player.height && en.y + en.height > player.y) {
                    enemies.splice(i, 1);
                    lives--;
                    livesEl.innerText = lives;
                    if (lives <= 0) endGame();
                }

                // Salida de pantalla
                if (en.y > canvas.height) {
                    enemies.splice(i, 1);
                }

                // Colisión con balas
                bullets.forEach((b, bi) => {
                    if (b.x < en.x + en.width && b.x + b.w > en.x &&
                        b.y < en.y + en.height && b.y + b.h > en.y) {
                        enemies.splice(i, 1);
                        bullets.splice(bi, 1);
                        score += 10;
                        scoreEl.innerText = score;
                    }
                });
            });
        }

        function draw() {
            ctx.fillStyle = 'black';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Dibujar Nave Jugador (Rosa)
            ctx.shadowBlur = 15;
            ctx.shadowColor = player.color;
            ctx.fillStyle = player.color;
            // Forma de nave triangular arcade
            ctx.beginPath();
            ctx.moveTo(player.x + player.width / 2, player.y);
            ctx.lineTo(player.x, player.y + player.height);
            ctx.lineTo(player.x + player.width, player.y + player.height);
            ctx.closePath();
            ctx.fill();

            // Dibujar Balas
            ctx.shadowBlur = 10;
            ctx.shadowColor = '#fff';
            ctx.fillStyle = '#fff';
            bullets.forEach(b => ctx.fillRect(b.x, b.y, b.w, b.h));

            // Dibujar Enemigos
            enemies.forEach(en => {
                ctx.shadowBlur = 15;
                ctx.shadowColor = en.color;
                ctx.fillStyle = en.color;
                ctx.fillRect(en.x, en.y, en.width, en.height);
                // Detalle retro
                ctx.strokeStyle = 'white';
                ctx.lineWidth = 1;
                ctx.strokeRect(en.x + 5, en.y + 5, en.width - 10, en.height - 10);
            });

            ctx.shadowBlur = 0; // Reset para rendimiento
        }

        function endGame() {
            gameActive = false;
            finalScoreEl.innerText = score;
            gameOverEl.style.display = 'flex';
        }

        function animate() {
            if (!gameActive) return;
            update();
            draw();
            requestAnimationFrame(animate);
        }

        // Iniciar
        spawnEnemy();
        animate();
    </script>
</body>
</html>
