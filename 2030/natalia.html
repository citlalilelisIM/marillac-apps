<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stellar Apocalypse - Arcade</title>
    <style>
        :root {
            --neon-blue: #00f3ff;
            --neon-pink: #ff0055;
            --neon-purple: #bc13fe;
            --space-bg: #050510;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--space-bg);
            color: white;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #game-container {
            position: relative;
            box-shadow: 0 0 50px rgba(0, 243, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.1);
        }

        canvas {
            display: block;
            background: radial-gradient(circle at center, #1a1a2e 0%, #050510 100%);
        }

        .ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .screen {
            display: none;
            pointer-events: all;
            background: rgba(5, 5, 16, 0.85);
            padding: 40px;
            border-radius: 15px;
            border: 1px solid var(--neon-blue);
            backdrop-filter: blur(10px);
        }

        .screen.active { display: block; }

        h1 {
            font-size: 3rem;
            text-transform: uppercase;
            letter-spacing: 5px;
            margin: 0 0 20px 0;
            background: linear-gradient(to bottom, #fff, var(--neon-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(0, 243, 255, 0.5);
        }

        .stats-top {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            font-weight: bold;
            font-size: 1.2rem;
            color: var(--neon-blue);
            pointer-events: none;
            text-transform: uppercase;
        }

        button {
            padding: 15px 40px;
            font-size: 1.2rem;
            background: transparent;
            color: var(--neon-blue);
            border: 2px solid var(--neon-blue);
            cursor: pointer;
            text-transform: uppercase;
            font-weight: bold;
            transition: 0.3s;
            margin-top: 20px;
        }

        button:hover {
            background: var(--neon-blue);
            color: var(--space-bg);
            box-shadow: 0 0 20px var(--neon-blue);
        }

        .msg-win { color: var(--neon-blue); }
        .msg-lose { color: var(--neon-pink); }
    </style>
</head>
<body>

<div id="game-container">
    <div class="stats-top">
        <div>Puntos: <span id="score-ui">0</span></div>
        <div>Nivel: <span id="level-ui">1</span></div>
        <div>Vidas: <span id="lives-ui">3</span></div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div class="ui-layer">
        <div id="start-screen" class="screen active">
            <h1>Stellar Apocalypse</h1>
            <p>Usa WASD o Flechas para moverte.<br>Barra Espaciadora para disparar.</p>
            <button onclick="startGame()">Iniciar Misión</button>
        </div>

        <div id="gameover-screen" class="screen">
            <h1 class="msg-lose">Misión Fallida</h1>
            <p>Tu nave fue destruida por los meteoritos.</p>
            <p>Puntuación Final: <span id="final-score">0</span></p>
            <button onclick="startGame()">Reiniciar Sistema</button>
        </div>

        <div id="win-screen" class="screen">
            <h1 class="msg-win">Misión Completada</h1>
            <p>Has sobrevivido al apocalipsis espacial.</p>
            <p>Eres el mejor piloto de la federación.</p>
            <button onclick="startGame()">Jugar de Nuevo</button>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    // Configuración de resolución
    canvas.width = 800;
    canvas.height = 600;

    // Estados del juego
    let score = 0;
    let level = 1;
    let lives = 3;
    let gameActive = false;
    let keys = {};

    // Objetos
    let player;
    let bullets = [];
    let enemies = [];
    let particles = [];
    let stars = [];

    // Clases
    class Player {
        constructor() {
            this.width = 40;
            this.height = 40;
            this.x = canvas.width / 2 - 20;
            this.y = canvas.height - 70;
            this.speed = 6;
            this.color = '#00f3ff';
        }

        draw() {
            ctx.save();
            ctx.shadowBlur = 15;
            ctx.shadowColor = this.color;
            
            // Cuerpo de la nave (Triángulo estilizado)
            ctx.fillStyle = this.color;
            ctx.beginPath();
            ctx.moveTo(this.x + this.width/2, this.y);
            ctx.lineTo(this.x + this.width, this.y + this.height);
            ctx.lineTo(this.x, this.y + this.height);
            ctx.closePath();
            ctx.fill();

            // Cabina
            ctx.fillStyle = "#fff";
            ctx.beginPath();
            ctx.arc(this.x + this.width/2, this.y + 25, 5, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.restore();
        }

        update() {
            if ((keys['ArrowLeft'] || keys['a']) && this.x > 0) this.x -= this.speed;
            if ((keys['ArrowRight'] || keys['d']) && this.x < canvas.width - this.width) this.x += this.speed;
            if ((keys['ArrowUp'] || keys['w']) && this.y > 0) this.y -= this.speed;
            if ((keys['ArrowDown'] || keys['s']) && this.y < canvas.height - this.height) this.y += this.speed;
        }
    }

    class Bullet {
        constructor(x, y) {
            this.x = x;
            this.y = y;
            this.speed = 8;
            this.radius = 3;
        }

        draw() {
            ctx.fillStyle = '#ff0055';
            ctx.shadowBlur = 10;
            ctx.shadowColor = '#ff0055';
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
            ctx.fill();
        }

        update() {
            this.y -= this.speed;
        }
    }

    class Enemy {
        constructor(level) {
            this.size = Math.random() * 30 + 20;
            this.x = Math.random() * (canvas.width - this.size);
            this.y = -this.size;
            this.speed = (Math.random() * 2 + 1) + (level * 0.5);
            this.rot = 0;
            this.rotSpeed = Math.random() * 0.05;
        }

        draw() {
            ctx.save();
            ctx.translate(this.x + this.size/2, this.y + this.size/2);
            ctx.rotate(this.rot);
            ctx.strokeStyle = '#bc13fe';
            ctx.lineWidth = 2;
            ctx.shadowBlur = 5;
            ctx.shadowColor = '#bc13fe';
            
            // Meteorito poligonal
            ctx.beginPath();
            ctx.moveTo(0, -this.size/2);
            ctx.lineTo(this.size/2, -this.size/4);
            ctx.lineTo(this.size/3, this.size/2);
            ctx.lineTo(-this.size/3, this.size/2);
            ctx.lineTo(-this.size/2, 0);
            ctx.closePath();
            ctx.stroke();
            ctx.restore();
            
            this.rot += this.rotSpeed;
        }

        update() {
            this.y += this.speed;
        }
    }

    class Particle {
        constructor(x, y, color) {
            this.x = x;
            this.y = y;
            this.color = color;
            this.size = Math.random() * 3;
            this.speedX = Math.random() * 6 - 3;
            this.speedY = Math.random() * 6 - 3;
            this.life = 1;
        }

        draw() {
            ctx.globalAlpha = this.life;
            ctx.fillStyle = this.color;
            ctx.fillRect(this.x, this.y, this.size, this.size);
            ctx.globalAlpha = 1;
        }

        update() {
            this.x += this.speedX;
            this.y += this.speedY;
            this.life -= 0.02;
        }
    }

    // Inicializar Fondo Estelar
    for(let i=0; i<100; i++) {
        stars.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            size: Math.random() * 2,
            speed: Math.random() * 1 + 0.5
        });
    }

    function spawnEnemy() {
        if (!gameActive) return;
        enemies.push(new Enemy(level));
        let timeout = Math.max(200, 1000 - (level * 150));
        setTimeout(spawnEnemy, timeout);
    }

    function createExplosion(x, y, color) {
        for(let i=0; i<15; i++) {
            particles.push(new Particle(x, y, color));
        }
    }

    function startGame() {
        score = 0;
        level = 1;
        lives = 3;
        bullets = [];
        enemies = [];
        particles = [];
        player = new Player();
        gameActive = true;

        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        updateUI();
        spawnEnemy();
        animate();
    }

    function updateUI() {
        document.getElementById('score-ui').innerText = score;
        document.getElementById('level-ui').innerText = level;
        document.getElementById('lives-ui').innerText = lives;
    }

    function checkCollision(rect1, rect2) {
        return rect1.x < rect2.x + rect2.size &&
               rect1.x + (rect1.width || 0) > rect2.x &&
               rect1.y < rect2.y + rect2.size &&
               rect1.y + (rect1.height || 0) > rect2.y;
    }

    function animate() {
        if (!gameActive) return;

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Fondo Estelar
        ctx.fillStyle = "white";
        stars.forEach(star => {
            ctx.fillRect(star.x, star.y, star.size, star.size);
            star.y += star.speed;
            if (star.y > canvas.height) star.y = 0;
        });

        player.update();
        player.draw();

        // Balas
        bullets.forEach((bullet, bIndex) => {
            bullet.update();
            bullet.draw();
            if (bullet.y < 0) bullets.splice(bIndex, 1);
        });

        // Enemigos
        enemies.forEach((enemy, eIndex) => {
            enemy.update();
            enemy.draw();

            // Colisión con jugador
            if (checkCollision(player, enemy)) {
                createExplosion(player.x + 20, player.y + 20, '#00f3ff');
                enemies.splice(eIndex, 1);
                lives--;
                updateUI();
                if (lives <= 0) endGame(false);
            }

            // Colisión con balas
            bullets.forEach((bullet, bIndex) => {
                if (checkCollision({x: bullet.x, y: bullet.y, width: 5, height: 5, size: 5}, enemy)) {
                    createExplosion(enemy.x + enemy.size/2, enemy.y + enemy.size/2, '#bc13fe');
                    enemies.splice(eIndex, 1);
                    bullets.splice(bIndex, 1);
                    score += 100;
                    
                    // Lógica de Niveles
                    if (score >= level * 4000) {
                        if (level < 5) {
                            level++;
                        } else {
                            endGame(true);
                        }
                    }
                    updateUI();
                }
            });

            if (enemy.y > canvas.height) enemies.splice(eIndex, 1);
        });

        // Partículas
        particles.forEach((p, index) => {
            p.update();
            p.draw();
            if (p.life <= 0) particles.splice(index, 1);
        });

        requestAnimationFrame(animate);
    }

    function endGame(win) {
        gameActive = false;
        if (win) {
            document.getElementById('win-screen').classList.add('active');
        } else {
            document.getElementById('final-score').innerText = score;
            document.getElementById('gameover-screen').classList.add('active');
        }
    }

    // Controles
    window.addEventListener('keydown', e => {
        keys[e.key] = true;
        if (e.key === ' ' && gameActive) {
            bullets.push(new Bullet(player.x + player.width/2, player.y));
        }
    });

    window.addEventListener('keyup', e => {
        keys[e.key] = false;
    });

</script>
</body>
</html>
