<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Bloque y Aves - Arcade</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #2c3e50;
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        #game-container {
            position: relative;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }
        canvas {
            background: linear-gradient(#87CEEB, #228B22);
            display: block;
            border: 4px solid #fff;
        }
        #ui-layer {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            text-shadow: 2px 2px #000;
            pointer-events: none;
        }
        #menu-inicio, #game-over {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 100;
        }
        button {
            padding: 15px 30px;
            font-size: 24px;
            background: #ff4757;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 10px;
        }
        button:hover { background: #ff6b81; }
        .instrucciones { font-size: 14px; margin-top: 10px; color: #ccc; }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas" width="1000" height="600"></canvas>
    <div id="ui-layer">
        <h2>PUNTOS: <span id="score">0</span> | VIDAS: <span id="lives">5</span></h2>
        <p>AVE ACTUAL: <span id="bird-type">-</span></p>
    </div>

    <div id="menu-inicio">
        <h1>BLOQUE Y AVES</h1>
        <button onclick="startGame()">INICIO</button>
        <p class="instrucciones">Flechas/WASD: Mover Resortera | Espacio: Disparar Ave | Habilidades automáticas al salir</p>
    </div>

    <div id="game-over" style="display:none;">
        <h1>¡FIN DEL JUEGO!</h1>
        <p>Puntuación total: <span id="final-score">0</span></p>
        <button onclick="location.reload()">REINICIAR</button>
    </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const livesEl = document.getElementById('lives');
const birdTypeEl = document.getElementById('bird-type');

// Configuración Global
let score = 0;
let lives = 5;
let gameActive = false;
let enemies = [];
let projectiles = [];
let particles = [];
let obstacles = [];
let explosives = [];
let wave = 1;
let lastSpawn = 0;

const resortera = { x: 80, y: 300, w: 20, h: 100, speed: 7 };
const birdPool = ["Rojo", "Amarillo", "Negro", "Azul", "Rojo Gigante", "Naranja", "Verde"];
let currentBirdIndex = 0;

// Teclado
const keys = {};
window.onkeydown = (e) => keys[e.code] = true;
window.onkeyup = (e) => keys[e.code] = false;

function startGame() {
    document.getElementById('menu-inicio').style.display = 'none';
    gameActive = true;
    updateBirdText();
    animate();
}

function updateBirdText() {
    birdTypeEl.innerText = birdPool[currentBirdIndex];
    birdTypeEl.style.color = getBirdColor(birdPool[currentBirdIndex]);
}

function getBirdColor(type) {
    switch(type) {
        case "Rojo": case "Rojo Gigante": return "#ff4757";
        case "Amarillo": return "#eccc68";
        case "Negro": return "#2f3542";
        case "Azul": return "#1e90ff";
        case "Naranja": return "#ffa502";
        case "Verde": return "#2ed573";
        default: return "white";
    }
}

class Projectile {
    constructor(type, x, y, angle = 0, speedMult = 1) {
        this.type = type;
        this.x = x;
        this.y = y;
        this.vx = 12 * speedMult;
        this.vy = angle;
        this.radius = type === "Rojo Gigante" ? 30 : (type === "Naranja" ? 8 : 12);
        this.active = true;
        this.color = getBirdColor(type);
        
        if(type === "Naranja") {
            setTimeout(() => { if(this.active) this.radius = 45; }, 300);
        }
    }

    update() {
        this.x += this.vx;
        this.y += this.vy;
        if(this.type === "Verde" && Math.random() > 0.8) { // Rayos láser
            createOno(this.x, this.y, "ZAP!", "#00ff00");
        }
        if(this.x > canvas.width || this.y < 0 || this.y > canvas.height) this.active = false;
    }

    draw() {
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fill();
        // Pico
        ctx.fillStyle = "orange";
        ctx.beginPath();
        ctx.moveTo(this.x + this.radius, this.y - 5);
        ctx.lineTo(this.x + this.radius + 15, this.y);
        ctx.lineTo(this.x + this.radius, this.y + 5);
        ctx.fill();
    }
}

class Enemy {
    constructor() {
        this.x = canvas.width + 50;
        this.y = Math.random() * (canvas.height - 100) + 50;
        this.vx = -(1.5 + wave * 0.5);
        this.radius = 20;
        this.active = true;
    }
    update() { 
        this.x += this.vx; 
        if(this.x < 0) {
            this.active = false;
            lives--;
            livesEl.innerText = lives;
            if(lives <= 0) gameOver();
        }
    }
    draw() {
        ctx.fillStyle = "#2ed573";
        ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = "white"; // Ojos
        ctx.beginPath(); ctx.arc(this.x - 7, this.y - 5, 5, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(this.x + 7, this.y - 5, 5, 0, Math.PI*2); ctx.fill();
    }
}

function createOno(x, y, txt, color = "yellow") {
    particles.push({x, y, txt, life: 30, color});
}

function spawnWave() {
    let now = Date.now();
    if(now - lastSpawn > 2000 - (wave * 100)) {
        enemies.push(new Enemy());
        if(Math.random() > 0.7) obstacles.push({x: canvas.width + 50, y: Math.random()*500, w: 20, h: 80});
        if(Math.random() > 0.9) explosives.push({x: canvas.width + 50, y: Math.random()*500, r: 15});
        lastSpawn = now;
        wave += 0.1;
    }
}

function fireBird() {
    const type = birdPool[currentBirdIndex];
    
    if(type === "Azul") {
        projectiles.push(new Projectile(type, resortera.x + 30, resortera.y, -2));
        projectiles.push(new Projectile(type, resortera.x + 30, resortera.y, 0));
        projectiles.push(new Projectile(type, resortera.x + 30, resortera.y, 2));
    } else if(type === "Amarillo") {
        projectiles.push(new Projectile(type, resortera.x + 30, resortera.y, 0, 2));
    } else {
        projectiles.push(new Projectile(type, resortera.x + 30, resortera.y));
    }

    currentBirdIndex = (currentBirdIndex + 1) % birdPool.length;
    updateBirdText();
}

function gameOver() {
    gameActive = false;
    document.getElementById('game-over').style.display = 'flex';
    document.getElementById('final-score').innerText = score;
}

function animate() {
    if(!gameActive) return;
    ctx.clearRect(0,0, canvas.width, canvas.height);

    // Mover resortera
    if((keys['ArrowUp'] || keys['KeyW']) && resortera.y > 50) resortera.y -= resortera.speed;
    if((keys['ArrowDown'] || keys['KeyS']) && resortera.y < canvas.height - 50) resortera.y += resortera.speed;
    if(keys['Space']) { fireBird(); keys['Space'] = false; }

    // Dibujar resortera
    ctx.fillStyle = "#5d4037";
    ctx.fillRect(resortera.x, resortera.y, resortera.w, resortera.h);
    ctx.fillRect(resortera.x - 10, resortera.y, 40, 10);

    spawnWave();

    // Actualizar Proyectiles
    projectiles.forEach((p, i) => {
        p.update(); p.draw();
        
        // Colisión con enemigos
        enemies.forEach((en, j) => {
            let dist = Math.hypot(p.x - en.x, p.y - en.y);
            if(dist < p.radius + en.radius) {
                if(p.type === "Negro") {
                    createOno(p.x, p.y, "CABOOM!", "orange");
                    // Eliminar enemigos cercanos en explosión
                    enemies.forEach(e => { if(Math.hypot(p.x - e.x, p.y - e.y) < 150) e.active = false; });
                } else {
                    createOno(en.x, en.y, "POW!");
                }
                en.active = false;
                if(p.type !== "Rojo Gigante") p.active = false;
                score += 100;
                scoreEl.innerText = score;
            }
        });

        // Colisión con explosivos
        explosives.forEach((ex, k) => {
            if(Math.hypot(p.x - ex.x, p.y - ex.y) < p.radius + ex.r) {
                createOno(ex.x, ex.y, "EXPLOSIÓN", "red");
                enemies.forEach(e => { if(Math.hypot(ex.x - e.x, ex.y - e.y) < 200) e.active = false; });
                explosives.splice(k, 1);
            }
        });
    });

    // Dibujar Enemigos y Obstáculos
    enemies = enemies.filter(e => e.active);
    enemies.forEach(e => { e.update(); e.draw(); });

    obstacles.forEach((ob, i) => {
        ob.x -= 2;
        ctx.fillStyle = "#7f8c8d";
        ctx.fillRect(ob.x, ob.y, ob.w, ob.h);
        projectiles.forEach(p => {
            if(p.x > ob.x && p.x < ob.x + ob.w && p.y > ob.y && p.y < ob.y + ob.h) p.active = false;
        });
    });

    explosives.forEach(ex => {
        ex.x -= 2;
        ctx.fillStyle = "red";
        ctx.beginPath(); ctx.arc(ex.x, ex.y, ex.r, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = "yellow"; ctx.fillText("TNT", ex.x - 10, ex.y + 5);
    });

    // Onomatopeyas
    particles.forEach((pa, i) => {
        ctx.fillStyle = pa.color;
        ctx.font = "bold 20px Arial";
        ctx.fillText(pa.txt, pa.x, pa.y);
        pa.y -= 1; pa.life--;
        if(pa.life <= 0) particles.splice(i, 1);
    });

    projectiles = projectiles.filter(p => p.active);
    requestAnimationFrame(animate);
}
</script>
</body>
</html>
